<body>

    ================================================================================
        CABEÇALHO (HEADER) - Topo da página com logo, idioma e botão voltar
    ================================================================================
    -->
    <header>
        <div class="main-header">
            <!-- Logo do site com emoji de livro -->
            <div class="logo">
                <span class="brain">📚</span> Desafio Histórico
            </div>
            
            <!-- Área direita do cabeçalho: seletor de idioma e botão voltar -->
            <div class="header-right">

                DROPDOWN DE IDIOMA
                Permite alternar entre Português, Inglês e Espanhol
                Não reinicia a página, muda os textos em tempo real
                -->
                <div class="language-dropdown">
                    <button class="lang-btn" id="lang-toggle">
                        <!-- Exibe idioma atual (PT/EN/ES) -->
                        <span id="current-lang">PT</span>
                        <span class="arrow">▶</span>
                    </button>

    </header>

    <main>

        ================================================================================
            SEÇÃO QUIZ - Exibe questões e permite ao usuário responder
        ================================================================================
        -->

            <!-- 
            CABEÇALHO DO QUIZ
            Inclui título, número da questão atual, total de questões e timer
            -->
            <div class="quiz-header">
                <h1 id="quiz-title">Desafio Histórico</h1>
                <div class="quiz-info">
                    <!-- Badge mostrando: questão atual / total de questões -->
                    <span class="badge progress-badge">
                        <span id="question-counter">1</span>/<span id="total-questions">15</span>
                    </span>
                    <!-- Timer em tempo real mostrando tempo decorrido -->
                    <span class="timer">
                        <i class="fas fa-hourglass-end"></i>
                        <span id="timer-display">00:00</span>
                    </span>
                </div>
            </div>

            <!-- 
            BARRA DE PROGRESSO
            Mostra visualmente quantas questões foram respondidas
            Preenchimento aumenta conforme avança nas questões
            -->
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>

            <!-- 
            CARD DA QUESTÃO
            Contém o texto da pergunta e as opções de resposta
            É atualizado dinamicamente com cada nova questão
            -->
            <div class="question-card">
                <!-- Número da questão atual -->
                <div class="question-number">Questão <span id="q-number">1</span></div>
                
                <!-- Texto da pergunta (muda conforme o idioma selecionado) -->
                <h2 class="question-text" id="question-text"></h2>
                
                <!-- 
                CONTAINER DE OPÇÕES
                Será preenchido dinamicamente com 4 botões de opções (A, B, C, D)
                Cada opção pode ser clicada para responder
                -->
                <div class="options-container" id="options-container"></div>
            </div>

            <!-- 
            FEEDBACK DA RESPOSTA
            Mostra se a resposta foi correta/incorreta e exibe a explicação
            Aparece após clicar em uma opção por 2 segundos
            -->
            <div class="feedback" id="feedback" style="display: none;">
                <!-- Resultado (Correto! ou Incorreto!) com ícone -->
                <div class="feedback-result" id="feedback-result"></div>
                <!-- Explicação detalhada da resposta correta -->
                <div class="explanation" id="explanation"></div>
            </div>
        </section>

        <!-- 
        ================================================================================
            SEÇÃO RESULTADOS - Mostra desempenho final após conclusão do quiz
        ================================================================================
        -->
        <section class="results-section" id="results-container" style="display: none;">
            <div class="results-card">
                <!-- Cabeçalho dos resultados -->
                <div class="results-header">
                    <h2 id="results-title">Seus Resultados</h2>
                    <p id="results-subtitle">Parabéns por completar o desafio!</p>
                </div>

                <!-- 
                EXIBIÇÃO DE PONTUAÇÃO
                Inclui: círculo com percentual, acertos/total e tempo total
                -->
                <div class="score-display">
                    <!-- Círculo com percentual em forma de progresso visual -->
                    <div class="score-circle">
                        <span class="score-percentage" id="score-percentage">0%</span>
                        <div class="score-label">Desempenho</div>
                    </div>
                    
                    <!-- Estatísticas detalhadas (acertos e tempo) -->
                    <div class="score-details">
                        <!-- Número de acertos em formato X/15 -->
                        <div class="stat-item">
                            <i class="fas fa-check-circle"></i>
                            <div>
                                <span class="stat-label">Acertos</span>
                                <span class="stat-value"><span id="correct-answers">0</span>/15</span>
                            </div>
                        </div>
                        <!-- Tempo total gasto no quiz -->
                        <div class="stat-item">

                            <div>
                                <span class="stat-label">Tempo Total</span>
                                <span class="stat-value"><span id="total-time">00:00</span></span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Mensagem personalizada baseada no desempenho (Excelente/Bom/Regular/Insuficiente) -->
                <div class="performance-message" id="performance-message"></div>

                <!-- 
                BOTÕES DE AÇÃO
                Permite tentar novamente ou visualizar histórico de desempenho
                -->
                <div class="results-actions">

                        <i class="fas fa-redo"></i> Tentar Novamente
                    </button>
                    <button class="btn primary" id="view-performance-btn">
                        <i class="fas fa-chart-line"></i> Ver Desempenho
                    </button>
                </div>
            </div>
        </section>
    </main>

         */
        i18next.init({
            lng: localStorage.getItem('studyPro_lang') || 'pt',
            resources: {
                // Dicionário português
                pt: { translation: {
                    "voltar": "← Voltar",
                    "tentar-novamente": "Tentar Novamente",
                    "ver-desempenho": "Ver Desempenho",
                    "desempenho": "Desempenho",
                    "seus-resultados": "Seus Resultados",
                    "parabens": "Parabéns por completar o desafio!",
                    "acertos": "Acertos",
                    "tempo-total": "Tempo Total",
                    "excelente": "Excelente! Você dominou a história!",
                    "bom": "Bom trabalho! Você tem conhecimento sólido.",
                    "regular": "Desempenho aceitável. Revise os conteúdos.",
                    "insuficiente": "Você precisa estudar mais história."
                }},
                // Dicionário inglês
                en: { translation: {
                    "voltar": "← Back",
                    "tentar-novamente": "Try Again",
                    "ver-desempenho": "View Performance",
                    "desempenho": "Performance",
                    "seus-resultados": "Your Results",
                    "parabens": "Congratulations on completing the challenge!",
                    "acertos": "Correct",
                    "tempo-total": "Total Time",
                    "excelente": "Excellent! You mastered history!",
                    "bom": "Good work! You have solid knowledge.",
                    "regular": "Acceptable performance. Review the content.",
                    "insuficiente": "You need to study more history."
                }},
                // Dicionário espanhol
                es: { translation: {
                    "voltar": "← Volver",
                    "tentar-novamente": "Intentar de Nuevo",
                    "ver-desempenho": "Ver Rendimiento",
                    "desempenho": "Rendimiento",
                    "seus-resultados": "Tus Resultados",
                    "parabens": "¡Felicidades por completar el desafío!",
                    "acertos": "Correctas",
                    "tempo-total": "Tiempo Total",
                    "excelente": "¡Excelente! ¡Dominaste la historia!",
                    "bom": "¡Buen trabajo! Tienes conocimiento sólido.",
                    "regular": "Desempeño aceptable. Revisa el contenido.",
                    "insuficiente": "Necesitas estudiar más historia."
                }}
            }
        });

        /**
         * ================================================================================
         *    VARIÁVEIS GLOBAIS
         * ================================================================================
         * 
         * Armazenam o estado do quiz durante a execução
         */
        
        // Índice da questão atual (0-14)
        let currentQuestionIndex = 0;
        
        // Array com respostas do usuário: userAnswers[0] = resposta da questão 1, etc
        let userAnswers = [];
        
        // Tempo total em segundos desde o início do quiz
        let totalTime = 0;
        
        // ID do intervalo do timer (usado para parar o timer)
        let timerInterval;
        
        // Idioma atual do quiz ('pt', 'en' ou 'es')
        let currentLang = localStorage.getItem('studyPro_lang') || 'pt';

        /**
         * ================================================================================
         *    REFERÊNCIAS AOS ELEMENTOS DO DOM (HTML)
         * ================================================================================
         * 
         * Estas variáveis armazenam referências aos elementos HTML
         * para que possamos atualizá-los dinamicamente com JavaScript
         */
        
        // Seção principal do quiz (questões)
        const quizContainer = document.getElementById('quiz-container');
        
        // Seção de resultados finais
        const resultsContainer = document.getElementById('results-container');
        
        // Elemento que mostra o texto da questão
        const questionText = document.getElementById('question-text');
        
        // Elemento que mostra o número da questão (1, 2, 3...)
        const qNumber = document.getElementById('q-number');
        
        // Elemento que mostra questão atual / total
        const questionCounter = document.getElementById('question-counter');
        
        // Container onde as 4 opções de resposta serão adicionadas
        const optionsContainer = document.getElementById('options-container');
        
        // Elemento que mostra o tempo decorrido (00:00)
        const timerDisplay = document.getElementById('timer-display');
        
        // Div que contém feedback (correto/incorreto + explicação)
        const feedbackDiv = document.getElementById('feedback');
        
        // Elemento que mostra "Correto!" ou "Incorreto!"
        const feedbackResult = document.getElementById('feedback-result');
        
        // Elemento que mostra a explicação da resposta
        const explanationDiv = document.getElementById('explanation');
        
        // Botão para voltar à página anterior
        const backBtn = document.getElementById('back-btn');
        
        // Barra de progresso visual
        const progressFill = document.getElementById('progress-fill');
        
        // Total de questões (15)
        const totalQuestions = document.getElementById('total-questions');

        /**
         * ================================================================================
         *    INICIALIZAÇÃO - Executado quando a página carrega
         * ================================================================================
         * 
         * Configura todos os listeners de clique nos botões
         * Configura o comportamento do dropdown de idioma
         * Inicia o quiz chamando a função init()
         */
        document.addEventListener('DOMContentLoaded', function() {
            // Define o número total de questões (15)
            totalQuestions.textContent = questionsData.length;
            
            /**
             * BOTÃO VOLTAR
             * Ao clicar, pergunta confirmação e volta à página anterior
             * Exemplo: window.location.href = '../index.html'
             */
            backBtn.addEventListener('click', function() {
                if (confirm('Voltar? Seu progresso será perdido.')) {
                    window.location.href = '../index.html';
                }
            });

            /**
             * DROPDOWN DE IDIOMA
             * Permite abrir/fechar o menu de seleção de idioma
             */
            const langToggle = document.getElementById('lang-toggle');
            const langMenu = document.getElementById('lang-menu');

            // Ao clicar no botão de idioma, abre/fecha o menu
            langToggle.addEventListener('click', function() {
                langMenu.classList.toggle('show');
            });

            /**
             * SELEÇÃO DE IDIOMA
             * Quando o usuário clica em PT, EN ou ES:
             * 1. Muda o idioma atual
             * 2. Atualiza localStorage
             * 3. Recarrega a questão com novo idioma
             * 4. Fecha o menu
             */
            document.querySelectorAll('.lang-option').forEach(option => {
                option.addEventListener('click', function() {
                    // Pega o código do idioma (pt, en, es)
                    const lang = this.dataset.lang;
                    
                    // Atualiza a variável global
                    currentLang = lang;
                    
                    // Usa i18next para trocar idioma (sem recarregar página)
                    i18next.changeLanguage(lang);
                    
                    // Salva preferência do usuário
                    localStorage.setItem('studyPro_lang', lang);
                    
                    // Mostra idioma escolhido no botão
                    document.getElementById('current-lang').textContent = lang.toUpperCase();
                    
                    // Fecha o menu
                    langMenu.classList.remove('show');
                    
                    // Recarrega questão com novo idioma
                    loadQuestion(currentQuestionIndex);
                    
                    // Atualiza exibição de resultados se estiver na tela de resultados
                    updateResultsUI();
                });
            });

            /**
             * FECHAR DROPDOWN AO CLICAR FORA
             * Quando clica em qualquer lugar da página (exceto no menu),
             * o dropdown de idioma fecha
             */
            document.addEventListener('click', function(e) {
                if (!langToggle.contains(e.target) && !langMenu.contains(e.target)) {
                    langMenu.classList.remove('show');
                }
            });

            /**
             * BOTÕES DE AÇÃO EM RESULTADOS
             * Configurados aqui para usar quando os resultados forem exibidos
             */
            
            // "Tentar Novamente": Reinicia o quiz
            document.getElementById('retry-btn').addEventListener('click', retryQuiz);
            
            // "Ver Desempenho": Leva à página de desempenho
            document.getElementById('view-performance-btn').addEventListener('click', function() {
                window.location.href = 'desempenho.html';
            });

            // Inicia o quiz
            init();
        });

        /**
         * ================================================================================
         *    FUNÇÕES PRINCIPAIS DO QUIZ
         * ================================================================================
         */

        /**
         * FUNÇÃO: init()
         * PROPÓSITO: Inicia um novo quiz com valores padrão
         * 
         * O que faz:
         * 1. Reseta índice para questão 1
         * 2. Limpa array de respostas
         * 3. Reseta timer para 0
         * 4. Mostra seção quiz, oculta resultados
         * 5. Carrega primeira questão
         * 6. Inicia contagem do timer
         */
        function init() {
            currentQuestionIndex = 0;
            userAnswers = [];
            totalTime = 0;
            quizContainer.style.display = 'block';
            resultsContainer.style.display = 'none';
            loadQuestion(0);
            startTimer();
        }

        /**
         * FUNÇÃO: getQuestion(index)
         * PROPÓSITO: Retorna a questão no idioma atual
         * PARÂMETRO: index = número da questão (0-14)
         * RETORNA: { question: "...", explanation: "..." } no idioma selecionado
         */
        function getQuestion(index) {
            return questionsData[index][currentLang];
        }

        /**
         * FUNÇÃO: getOptions(index)
         * PROPÓSITO: Retorna as 4 opções da questão no idioma atual
         * PARÂMETRO: index = número da questão (0-14)
         * RETORNA: Array com 4 strings (as 4 opções)
         */
        function getOptions(index) {
            return questionsData[index].options[currentLang];
        }

        /**
         * FUNÇÃO: loadQuestion(index)
         * PROPÓSITO: Carrega e exibe uma questão na tela
         * PARÂMETRO: index = número da questão (0-14)
         * 
         * O que faz:
         * 1. Pega dados da questão
         * 2. Define números da questão (1, 2, 3...)
         * 3. Define texto da questão
         * 4. Cria 4 botões de opção (A, B, C, D)
         * 5. Oculta feedback anterior
         * 6. Atualiza barra de progresso
         */
        function loadQuestion(index) {
            const questionData = questionsData[index];
            const currentQData = getQuestion(index);
            const options = getOptions(index);

            // Exibe "Questão 1", "Questão 2", etc
            qNumber.textContent = index + 1;
            questionCounter.textContent = index + 1;
            questionText.textContent = currentQData.question;

            // Limpa opções antigas
            optionsContainer.innerHTML = '';
            
            // Para cada uma das 4 opções, cria um botão (A, B, C, D)
            options.forEach((option, optionIndex) => {
                const optionElement = document.createElement('div');
                optionElement.className = 'option';
                optionElement.innerHTML = `
                    <span class="option-letter">${String.fromCharCode(65 + optionIndex)}</span>
                    <span class="option-text">${option}</span>
                `;
                optionElement.addEventListener('click', () => selectOption(optionIndex, index));
                optionsContainer.appendChild(optionElement);
            });

            // Oculta feedback anterior
            feedbackDiv.style.display = 'none';
            
            // Atualiza barra de progresso visual
            updateProgressBar();
        }

        /**
         * FUNÇÃO: selectOption(optionIndex, questionIndex)
         * PROPÓSITO: Processa a resposta do usuário
         * 
         * O que faz:
         * 1. Verifica se resposta está correta
         * 2. Armazena resposta em userAnswers[]
         * 3. Destaca: verde (correta), vermelho (incorreta)
         * 4. Mostra feedback e explicação
         * 5. Desabilita cliques
         * 6. Aguarda 2 segundos
         * 7. Avança automaticamente para próxima ou mostra resultados
         */
        /**
         * FUNÇÃO: selectOption(optionIndex, questionIndex)
         * PROPÓSITO: Processa a resposta do usuário quando clica em uma opção
         * PARÂMETROS:
         *   - optionIndex: índice da opção clicada (0=A, 1=B, 2=C, 3=D)
         *   - questionIndex: índice da questão atual (0-14)
         *
         * O que faz:
         * 1. Verifica se resposta está correta comparando com gabarito
         * 2. Armazena resposta em userAnswers[] para cálculo posterior
         * 3. Destaca visualmente: verde (correta), vermelho (incorreta)
         * 4. Mostra feedback e explicação detalhada
         * 5. Desabilita demais cliques nesta questão
         * 6. Aguarda 2 segundos
         * 7. Avança automaticamente para próxima questão ou exibe resultados
         */
        function selectOption(optionIndex, questionIndex) {
            // Verifica se a opção clicada é a resposta correta
            const isCorrect = optionIndex === questionsData[questionIndex].correct;
            
            // Armazena a resposta para calcular pontuação depois
            userAnswers[questionIndex] = optionIndex;

            // Destaque visual das opções
            const options = document.querySelectorAll('.option');
            options.forEach((opt, index) => {
                opt.classList.remove('selected', 'correct', 'incorrect');
                // Verde: opção correta
                if (index === questionsData[questionIndex].correct) {
                    opt.classList.add('correct');
                } else if (index === optionIndex && !isCorrect) {
                    opt.classList.add('incorrect');
                }
                opt.style.pointerEvents = 'none';
            });

            // Feedback visual (ícone + texto)
            feedbackDiv.style.display = 'block';
            feedbackResult.className = `feedback-result ${isCorrect ? 'correct' : 'incorrect'}`;
            feedbackResult.innerHTML = `
                <i class="fas fa-${isCorrect ? 'check' : 'times'}-circle"></i>
                <span>${isCorrect ? 'Correto!' : 'Incorreto!'}</span>
            `;
            
            // Explicação detalhada da resposta
            explanationDiv.innerHTML = `<strong>Explicação:</strong> ${getQuestion(questionIndex).explanation}`;

            /**
             * AUTO-AVANÇO: após 2 segundos (2000ms)
             * Se não for última questão: carrega a próxima
             * Se for última questão: mostra tela de resultados finais
             */
            setTimeout(() => {
                if (questionIndex < questionsData.length - 1) {
                    currentQuestionIndex = questionIndex + 1;
                    loadQuestion(currentQuestionIndex);
                } else {
                    showResults();
                }
            }, 2000);
        }

        /**
         * FUNÇÃO: updateProgressBar()
         * PROPÓSITO: Atualiza a barra de progresso visual do quiz
         *
         * Fórmula: (questão atual + 1) / total de questões * 100
         * 
         * Exemplos:
         *   - Questão 1 de 15: (0 + 1) / 15 * 100 = 6.67% preenchida
         *   - Questão 8 de 15: (7 + 1) / 15 * 100 = 53.33% preenchida
         *   - Questão 15 de 15: (14 + 1) / 15 * 100 = 100% preenchida
         */
        function updateProgressBar() {
            const progress = ((currentQuestionIndex + 1) / questionsData.length) * 100;
            progressFill.style.width = progress + '%';
        }

        /**
         * FUNÇÃO: startTimer()
         * PROPÓSITO: Inicia a contagem de tempo do quiz
         * 
         * O que faz:
         * 1. Cancela qualquer timer anterior (se existir)
         * 2. Configura um intervalo que executa a cada 1000ms (1 segundo)
         * 3. A cada segundo: incrementa totalTime em 1
         * 4. Converte segundos para formato MM:SS (00:45, 01:30, 02:15, etc)
         * 5. Exibe tempo no elemento timerDisplay
         *
         * Detalhes técnicos:
         * - Math.floor(totalTime / 60) = número de minutos completos
         * - totalTime % 60 = número de segundos restantes
         * - .padStart(2, '0') = garante 2 dígitos (01, 02... 59)
         */
        function startTimer() {
            // Se houver timer ativo, cancela antes de criar novo
            if (timerInterval) clearInterval(timerInterval);
            
            // Intervalo que executa a cada 1 segundo (1000ms)
            timerInterval = setInterval(() => {
                // Incrementa 1 segundo ao tempo total
                totalTime++;
                
                // Calcula minutos e segundos
                const mins = Math.floor(totalTime / 60);
                const secs = totalTime % 60;
                
                // Exibe no formato MM:SS (ex: 00:45, 01:30)
                timerDisplay.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            }, 1000);
        }

        /**
         * FUNÇÃO: showResults()
         * PROPÓSITO: Exibe a tela de resultados finais do quiz
         * 
         * O que faz:
         * 1. Para o timer de contagem de tempo
         * 2. Oculta seção de quiz, mostra seção de resultados
         * 3. Calcula número total de acertos
         * 4. Calcula percentual de desempenho (0-100%)
         * 5. Salva dados em localStorage para histórico (usado em desempenho.html)
         * 6. Chama updateResultsUI() para exibir valores na tela
         *
         * Dados salvos em localStorage:
         * - date: data/hora em formato ISO (para gráficos de histórico)
         * - correct: número de acertos (ex: 12)
         * - time: tempo total em segundos (ex: 245)
         * - subject: sempre 'historia' para este quiz
         * - score: percentual de acerto (ex: 80)
         */
        function showResults() {
            // Para a contagem do timer
            clearInterval(timerInterval);
            
            // Oculta quiz, mostra tela de resultados
            quizContainer.style.display = 'none';
            resultsContainer.style.display = 'block';

            /**
             * CÁLCULO DE ACERTOS:
             * .filter() compara cada resposta com a correta
             * userAnswers[idx] === questionsData[idx].correct
             * .length conta quantos acertos houve
             */
            const correctCount = userAnswers.filter((ans, idx) => ans === questionsData[idx].correct).length;
            
            // Calcula percentual: acertos / total * 100
            const percentage = Math.round((correctCount / questionsData.length) * 100);

            /**
             * SALVAR DESEMPENHO em localStorage
             * Permite que página de desempenho.html visualize o histórico
             * Cada quiz respondido adiciona um objeto ao array
             */
            const performanceHistory = JSON.parse(localStorage.getItem('studyPro_performance') || '[]');
            performanceHistory.push({
                date: new Date().toISOString(),      // Data/hora atual (ISO format)
                correct: correctCount,                // Número de acertos (ex: 12 de 15)
                time: totalTime,                      // Tempo total em segundos
                subject: 'historia',                  // Disciplina (história)
                score: percentage                     // Percentual (0-100)
            });
            
            // Salva tudo de volta no localStorage
            localStorage.setItem('studyPro_performance', JSON.stringify(performanceHistory));

            // Atualiza elementos HTML com valores dos resultados
            updateResultsUI();
        }

        /**
         * FUNÇÃO: updateResultsUI()
         * PROPÓSITO: Atualiza elementos visuais com dados dos resultados finais
         * 
         * O que faz:
         * 1. Calcula número de acertos comparando com gabarito
         * 2. Calcula percentual de desempenho (0-100%)
         * 3. Converte tempo em segundos para formato MM:SS
         * 4. Atualiza elementos HTML com os valores calculados
         * 5. Exibe mensagem motivacional baseada na pontuação
         *
         * Mensagens motivacionais:
         * - >= 90%: "Excelente!" (green)
         * - 70-89%: "Bom!" (blue)
         * - 50-69%: "Regular" (yellow)
         * - < 50%: "Insuficiente" (red)
         */
        function updateResultsUI() {
            // Calcula número de acertos (conta quantas respostas conferiram com o gabarito)
            const correctCount = userAnswers.filter((ans, idx) => ans === questionsData[idx].correct).length;
            
            // Calcula percentual de acerto: acertos / total * 100, arredonda para inteiro
            const percentage = Math.round((correctCount / questionsData.length) * 100);
            
            // Converte tempo em segundos para minutos:segundos
            // Ex: 245 segundos = 4 minutos e 5 segundos
            const mins = Math.floor(totalTime / 60);
            const secs = totalTime % 60;

            // Atualiza elemento que mostra o percentual (0-100)
            document.getElementById('score-percentage').textContent = percentage;
            
            // Atualiza elemento que mostra número de acertos (ex: "12" em "12 de 15")
            document.getElementById('correct-answers').textContent = correctCount;
            
            // Atualiza elemento que mostra tempo total (ex: "04:05")
            document.getElementById('total-time').textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;

            /**
             * MENSAGEM MOTIVACIONAL
             * Baseada no percentual, exibe feedback positivo e encorajador
             * Usa i18next para suportar múltiplos idiomas
             */
            let message = '';
            if (percentage >= 90) message = i18next.t('excelente');              // >= 90%: "Excelente!"
            else if (percentage >= 70) message = i18next.t('bom');               // 70-89%: "Bom!"
            else if (percentage >= 50) message = i18next.t('regular');           // 50-69%: "Regular"
            else message = i18next.t('insuficiente');                            // < 50%: "Insuficiente"
            
            // Exibe a mensagem na tela
            document.getElementById('performance-message').textContent = message;
        }

        /**
         * FUNÇÃO: retryQuiz()
         * PROPÓSITO: Reinicia o quiz igual ao início
         * 
         * O que faz:
         * Chama init() que reseta todos os valores e começa um novo quiz:
         * - Volta para questão 1
         * - Limpa respostas anteriores
         * - Reseta timer
         * - Oculta tela de resultados
         * - Inicia novo timer de contagem
         */
        function retryQuiz() {
            init();
        }
    </script>
</body>
</html>
