       - Link para pĂĄgina de cadastro

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!-- Metadados essenciais -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | StudyPro</title> <!-- // TĂ­tulo da aba do navegador -->
    
    <!-- Fonte Poppins para consistĂȘncia visual -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Estilos da pĂĄgina de login -->
    <link rel="stylesheet" href="../css/login.css"> <!-- // Importa o CSS da pĂĄgina de login -->
    
    <!-- Boxicons para Ă­cones nos inputs -->
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
    
    <!-- i18next para sistema de traduĂ§ĂŁo multilĂ­ngue -->
    <script src="https://unpkg.com/i18next@23.15.1/dist/umd/i18next.min.js"></script>

    <script type="module" src="../scripts/firebaseauth.js"></script>
    <link rel="stylesheet" href="../css/site-common.css">
    </head>
<body>
    <!-- CABEĂALHO COM SELETOR DE IDIOMA -->
    <!-- Header antigo removido - substituído por site-common.js -->


    <div class="container" id="signIn"> <!-- // Container centralizado para o formulĂĄrio LOGIN-->
        <h1 data-i18n="login-title">Bem-vindo ao StudyPro</h1> <!-- // TĂ­tulo principal da pĂĄgina -->

        <div id="signInMessage" class="messageDiv"></div>
        
        <div class="input-group">
            <i class="bx bxs-envelope"></i>
            <input type="email" id="email" placeholder="Email" data-i18n-placeholder="Email" required> <!-- // Campo para e-mail -->
        </div>

        <div class="input-group">
            <i class="bx bxs-lock-alt"></i>
            <input type="password" id="password" placeholder="Senha" data-i18n-placeholder="Senha" required> <!-- // Campo para senha -->
        </div>

        <button type="button" class="btn" id="submitSignIn" data-i18n="entrar">Entrar</button> <!-- // BotĂŁo para enviar o formulĂĄrio de login -->
        <div class="social-login"> <!-- // Ărea para login social -->
            <p data-i18n="social-text">Ou entre com:</p> <!-- // Texto explicativo -->
            <button class="google-btn" type="button">               
                <img src="../imagens/logo-google.webp" alt="Google"> Google <!-- // BotĂŁo de login com Google -->
            </button>
            <button class="facebook-btn" type="button">
                <img src="../imagens/logo-facebook.PNG" alt="Facebook"> Facebook <!-- // BotĂŁo de login com Facebook -->
            </button>
            <button class="apple-btn" type="button">
                <img src="../imagens/logo-apple.webp" alt="Apple"> Apple <!-- // BotĂŁo de login com Apple -->
            </button>
        </div>
        
        
        <p data-i18n="no-account">NĂŁo tem uma conta?</p> <!-- // Texto para quem nĂŁo tem conta -->
        <button id="signUpButton" class="switch-btn" data-i18n="cadastrese">Cadastre-se</button> <!-- // BotĂŁo para ir para a pĂĄgina de cadastro -->
        <a href="../index.html" class="back-btn" data-i18n="voltar-inicio">Voltar para a pĂĄgina inicial</a> <!-- // BotĂŁo para voltar Ă  pĂĄgina inicial -->
    </div>



    <div class="container" id="signup" style="display: none;"> <!-- // Container centralizado para o formulĂĄrio CADASTRO-->
        <h1 data-i18n="cadastro-title">Crie sua conta</h1> <!-- // TĂ­tulo principal da pĂĄgina -->

        <div id="signUpMessage" class="messageDiv"></div>
        
        <div class="input-group">
            <i class="bx bxs-user"></i>
            <input type="text" id="fName" placeholder="Nome" data-i18n-placeholder="Nome" required> <!-- // Campo para nome -->
        </div>

        <div class="input-group">
            <i class="bx bxs-user"></i>
            <input type="text" id="lName" placeholder="Sobrenome" data-i18n-placeholder="Sobrenome" required> <!-- // Campo para sobrenome -->
        </div>

        <div class="input-group">
            <i class="bx bxs-envelope"></i>
            <input type="email" id="rEmail" placeholder="E-mail" data-i18n-placeholder="Email" required> <!-- // Campo para e-mail -->
        </div>

        <div class="input-group">
            <i class="bx bxs-lock-alt"></i>
            <input type="password" id="rPassword" placeholder="Senha" data-i18n-placeholder="Senha" required> <!-- // Campo para senha -->
        </div>

        <button type="button" class="btn" id="submitSignUp" data-i18n="cadastrar">Cadastrar</button> <!-- // BotĂŁo para enviar o formulĂĄrio de cadastro -->
        
        <div class="social-login"> <!-- // Ărea para cadastro social -->
            <p data-i18n="social-text">Ou cadastre-se com:</p> <!-- // Texto explicativo -->
            <button class="google-btn" type="button">
                <img src="../imagens/logo-google.webp" alt="Google"> Google <!-- // BotĂŁo de cadastro com Google -->
            </button>
            <button class="facebook-btn" type="button">
                <img src="../imagens/logo-facebook.PNG" alt="Facebook"> Facebook <!-- // BotĂŁo de cadastro com Facebook -->
            </button>
            <button class="apple-btn" type="button">
                <img src="../imagens/logo-apple.webp" alt="Apple"> Apple <!-- // BotĂŁo de cadastro com Apple -->
            </button>
        </div>
        
        <p data-i18n="tem-conta">JĂĄ tem uma conta?</p> <!-- // Texto para quem jĂĄ tem conta -->
        <button id="signInButton" class="switch-btn" data-i18n="entrar">Entrar</button> <!-- // BotĂŁo para ir para a pĂĄgina de login -->
        <a href="../index.html" class="back-btn" data-i18n="voltar-inicio">Voltar para a pĂĄgina inicial</a> <!-- // BotĂŁo para voltar Ă  pĂĄgina inicial -->
    </div>

    <script src="../scripts/script.js"></script>



    <!-- SCRIPT: ConfiguraĂ§ĂŁo de TraduĂ§ĂŁo MultilĂ­ngue -->
    <script>
        // ===== INICIALIZAĂĂO DO i18next =====
        // Configura o sistema de traduĂ§ĂŁo com suporte a PortuguĂȘs, InglĂȘs e Espanhol
        i18next.init({
            lng: 'pt', // idioma padrĂŁo Ă© portuguĂȘs
            debug: false,
            resources: {
                // TraduĂ§Ă”es em PortuguĂȘs
                pt: { translation: {
                    "login-title": "Bem-vindo ao StudyPro",
                    "cadastro-title": "Crie sua conta",
                    "user-email": "UsuĂĄrio ou E-mail",
                    "password": "Senha",
                    "entrar": "Entrar",
                    "social-text": "Ou entre com:",
                    "no-account": "NĂŁo tem uma conta?",
                    "cadastrese": "Cadastre-se",
                    "cadastrar": "Cadastrar",
                    "tem-conta": "JĂĄ tem uma conta?",
                    "voltar-inicio": "Voltar para a pĂĄgina inicial"
                }},
                // TraduĂ§Ă”es em InglĂȘs
                en: { translation: {
                    "login-title": "Welcome to StudyPro",
                    "cadastro-title": "Create your account",
                    "user-email": "Username or Email",
                    "password": "Password",
                    "entrar": "Sign In",
                    "social-text": "Or sign in with:",
                    "no-account": "Don't have an account?",
                    "cadastrese": "Sign Up",
                    "cadastrar": "Register",
                    "tem-conta": "Already have an account?",
                    "voltar-inicio": "Back to homepage"
                }},
                // TraduĂ§Ă”es em Espanhol
                es: { translation: {
                    "login-title": "Bienvenido a StudyPro",
                    "cadastro-title": "Crea tu cuenta",
                    "user-email": "Usuario o Correo ElectrĂłnico",
                    "password": "ContraseĂ±a",
                    "entrar": "Iniciar SesiĂłn",
                    "social-text": "O inicia sesiĂłn con:",
                    "no-account": "ÂżNo tienes una cuenta?",
                    "cadastrese": "RegĂ­strate",
                    "cadastrar": "Registrarse",
                    "tem-conta": "ÂżYa tienes una cuenta?",
                    "voltar-inicio": "Volver a la pĂĄgina de inicio"
                }}
            }
        }, function(err, t) {
            updateContent();
        });

        // ===== FUNĂĂO: Atualizar ConteĂșdo da PĂĄgina =====
        function updateContent() {
            // Atualiza textos com data-i18n
            document.querySelectorAll('[data-i18n]').forEach(function(element) {
                const key = element.getAttribute('data-i18n');
                element.textContent = i18next.t(key);
            });

            // Atualiza placeholders com data-i18n-placeholder
            document.querySelectorAll('[data-i18n-placeholder]').forEach(function(element) {
                const key = element.getAttribute('data-i18n-placeholder');
                element.placeholder = i18next.t(key);
            });
        }

        // ===== CONTROLE DO DROPDOWN DE IDIOMA =====
        const langToggle = document.getElementById('lang-toggle');
        const langMenu = document.getElementById('lang-menu');
        const currentLang = document.getElementById('current-lang');
        const arrow = langToggle.querySelector('.arrow');

        // Clique no botĂŁo de idioma: abre/fecha menu
        langToggle.addEventListener('click', function(e) {
            e.stopPropagation();
            langMenu.classList.toggle('show');
            langToggle.classList.toggle('active');
            if (langToggle.classList.contains('active')) {
                arrow.style.transform = 'rotate(90deg)';
            } else {
                arrow.style.transform = 'rotate(0deg)';
            }
        });

        // Clique em uma opĂ§ĂŁo de idioma
        document.querySelectorAll('.lang-option').forEach(option => {
            option.addEventListener('click', function() {
                const newLang = this.getAttribute('data-lang');
                currentLang.textContent = newLang.toUpperCase();
                i18next.changeLanguage(newLang, function() {
                    updateContent();
                });
                langMenu.classList.remove('show');
                langToggle.classList.remove('active');
                arrow.style.transform = 'rotate(0deg)';
            });
        });

        // Clique fora fecha o dropdown
        document.addEventListener('click', function(e) {
            if (!langToggle.contains(e.target) && !langMenu.contains(e.target)) {
                langMenu.classList.remove('show');
                langToggle.classList.remove('active');
                arrow.style.transform = 'rotate(0deg)';
            }
        });
    </script>
</body>
<!-- Site common: auto-inject header, footer and translator -->
<script src="../scripts/site-common.js"></script>
</html>
