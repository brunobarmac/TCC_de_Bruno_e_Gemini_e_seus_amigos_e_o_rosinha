<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="../css/otp.css" rel="stylesheet">
    
    <!-- IMPORTANTE: manter module -->
    <script type="module" src="../scripts/otp.js"></script>

    <title>Verificação de Duas Etapas com Número</title>
</head>
<body>
    <div class="container">
        <div id="sender">
            <input type="text" id="number" placeholder="Digite seu número">
            
            <!-- ESSENCIAL -->
            <div id="recaptcha-container"></div>

            <input type="button" id="send" value="Enviar OTP" onclick="phoneAuth()">
        </div>

        <div id="verifier" style="display: none">
            <input type="text" id="verificationcode" placeholder="Digite o OTP recebido">
            <input type="button" id="verify" value="Verificar OTP" onclick="codeverify()">

            <div class="p-conf" style="display:none;">Número verificado</div>
            <div class="n-conf" style="display:none;">Código inválido</div>
        </div>
    </div>
</body>
</html>
