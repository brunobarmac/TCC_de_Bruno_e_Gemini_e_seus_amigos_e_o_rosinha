<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sala de Troféus - StudyPro</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212; /* Fundo escuro elegante */
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        .header h1 { color: #ffd700; font-size: 36px; text-transform: uppercase; letter-spacing: 2px; }
        .header p { color: #aaa; font-size: 18px; }
        
        .trophy-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .trophy-card {
            background-color: #1e1e1e;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            border: 1px solid #333;
            transition: transform 0.3s;
        }
        .trophy-card:hover { transform: translateY(-5px); border-color: #ffd700; box-shadow: 0 10px 20px rgba(255, 215, 0, 0.1); }

        /* Classe para troféus que o usuário já ganhou */
        .trophy-card.unlocked img {
            width: 100%;
            height: auto;
            max-height: 200px;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(255,215,0,0.5));
        }

        /* Classe para troféus ainda não conquistados (Silhueta) */
        .trophy-card.locked img {
            width: 100%;
            height: auto;
            max-height: 200px;
            object-fit: contain;
            filter: grayscale(100%) brightness(20%) drop-shadow(0 0 0 rgba(0,0,0,0));
            opacity: 0.5;
        }

        .trophy-card h3 { margin: 15px 0 5px 0; font-size: 20px; color: #fff; }
        .trophy-card p { font-size: 14px; color: #888; margin: 0; }
        .trophy-card.locked h3 { color: #555; }
        
        .back-btn {
            display: inline-block;
            margin-top: 40px;
            padding: 10px 20px;
            background-color: #333;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: 0.2s;
        }
        .back-btn:hover { background-color: #ff69b4; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Sua Galeria de Conquistas</h1>
        <p>Acompanhe seu progresso e exiba seus troféus.</p>
    </div>

    <div class="trophy-grid" id="galeria">
        
        <!-- Troféu Desbloqueado -->
        <div class="trophy-card unlocked" id="trofeu-historia">
            <img src="../imagens/trofeu_revolucaoFra.png" alt="Trophée de l'Histoire">
            <h3>Trophée de l'Histoire</h3>
            <p>100% em Revolução Francesa</p>
        </div>

        <!-- Troféu Bloqueado (Exemplo para você ver como fica) -->
        <div class="trophy-card locked" id="trofeu-quimica">
            <img src="../assets/trofeu_generico.png" alt="Troféu Bloqueado">
            <h3>Mestre das Moléculas</h3>
            <p>Gabarite Estequiometria</p>
        </div>

        <div class="trophy-card locked" id="trofeu-biologia">
            <img src="../assets/trofeu_generico.png" alt="Troféu Bloqueado">
            <h3>Célula de Ouro</h3>
            <p>Gabarite Citologia</p>
        </div>

    </div>

    <div style="text-align: center;">
        <a href="../index.html" class="back-btn">← Voltar ao Menu Principal</a>
    </div>

</body>
</html>
