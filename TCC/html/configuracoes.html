<body>
    <!--

        <!--

        <div class="settings-container">

            <section class="settings-section profile-section">

                        <button class="btn btn-change-photo" data-i18n="mudar-foto">Mudar Foto</button>
                        <!--

        <!--

            <!--

            SeleĂ§ĂŁo entre tema claro e escuro

            <div class="form-group">

                    <!-- OpĂ§ĂŁo: Tema Escuro -->

        <!--

            <!--

            <!--
            BOTĂO SAIR DA CONTA

            Cor de alerta para indicar aĂ§ĂŁo irreversĂ­vel

        </div>
    </main>

    <!--
    ================================================================================
    RODAPĂ DA PĂGINA
    InformaĂ§Ă”es de copyright e direitos autorais

    -->
    <footer class="settings-footer">
        <p data-i18n="footer-texto">Â© 2024 StudyPro. Todos os direitos reservados.</p>
    </footer>

    <!--
    ================================================================================
    SEĂĂO: JAVASCRIPT - FUNCIONALIDADES DINĂMICAS
    Sistema de internacionalizaĂ§ĂŁo, controles interativos e funcionalidades especĂ­ficas
    ================================================================================
    -->

    <script>
        <!--
        ===== CONFIGURAĂĂO DO SISTEMA DE TRADUĂĂO (i18next) =====
        Inicializa biblioteca i18next com suporte completo a trĂȘs idiomas
        Recursos extensivos para cobrir todas as strings da interface de configuraĂ§Ă”es
        -->
        i18next.init({
            lng: 'pt', // Idioma padrĂŁo: PortuguĂȘs
            debug: false, // Modo debug desabilitado para produĂ§ĂŁo
            resources: {
                // ===== RECURSOS DE TRADUĂĂO EM PORTUGUĂS =====
                pt: { translation: {
                    "config-title": "ConfiguraĂ§Ă”es da Conta",
                    "voltar": "Voltar",
                    "perfil": "Perfil",
                    "foto-perfil": "Foto de Perfil",
                    "mudar-foto": "Mudar Foto",
                    "nome-completo": "Nome Completo",
                    "email": "Email",
                    "usuario": "Nome de UsuĂĄrio",
                    "seguranca": "SeguranĂ§a",
                    "senha-atual": "Senha Atual",
                    "nova-senha": "Nova Senha",
                    "confirmar-senha": "Confirmar Senha",
                    "dois-fatores": "Ativar AutenticaĂ§ĂŁo de Dois Fatores",
                    "preferencias": "PreferĂȘncias",
                    "idioma-padrao": "Idioma PadrĂŁo",
                    "portugues": "PortuguĂȘs",
                    "ingles": "InglĂȘs",
                    "espanhol": "Espanhol",
                    "tema": "Tema",
                    "tema-claro": "Claro",
                    "tema-escuro": "Escuro",
                    "notif-email": "Receber notificaĂ§Ă”es por email",
                    "notif-push": "Receber notificaĂ§Ă”es push",
                    "salvar": "Salvar AlteraĂ§Ă”es",
                    "cancelar": "Cancelar",
                    "sair": "Sair da Conta",
                    "footer-texto": "Â© 2024 StudyPro. Todos os direitos reservados."
                }},
                // ===== RECURSOS DE TRADUĂĂO EM INGLĂS =====
                en: { translation: {
                    "config-title": "Account Settings",
                    "voltar": "Back",
                    "perfil": "Profile",
                    "foto-perfil": "Profile Picture",
                    "mudar-foto": "Change Photo",
                    "nome-completo": "Full Name",
                    "email": "Email",
                    "usuario": "Username",
                    "seguranca": "Security",
                    "senha-atual": "Current Password",
                    "nova-senha": "New Password",
                    "confirmar-senha": "Confirm Password",
                    "dois-fatores": "Enable Two-Factor Authentication",
                    "preferencias": "Preferences",
                    "idioma-padrao": "Default Language",
                    "portugues": "Portuguese",
                    "ingles": "English",
                    "espanhol": "Spanish",
                    "tema": "Theme",
                    "tema-claro": "Light",
                    "tema-escuro": "Dark",
                    "notif-email": "Receive email notifications",
                    "notif-push": "Receive push notifications",
                    "salvar": "Save Changes",
                    "cancelar": "Cancel",
                    "sair": "Sign Out",
                    "footer-texto": "Â© 2024 StudyPro. All rights reserved."
                }},
                // ===== RECURSOS DE TRADUĂĂO EM ESPANHOL =====
                es: { translation: {
                    "config-title": "ConfiguraciĂłn de la Cuenta",
                    "voltar": "Volver",
                    "perfil": "Perfil",
                    "foto-perfil": "Foto de Perfil",
                    "mudar-foto": "Cambiar Foto",
                    "nome-completo": "Nombre Completo",
                    "email": "Correo ElectrĂłnico",
                    "usuario": "Nombre de Usuario",
                    "seguranca": "Seguridad",
                    "senha-atual": "ContraseĂ±a Actual",
                    "nova-senha": "Nueva ContraseĂ±a",
                    "confirmar-senha": "Confirmar ContraseĂ±a",
                    "dois-fatores": "Habilitar AutenticaciĂłn de Dos Factores",
                    "preferencias": "Preferencias",
                    "idioma-padrao": "Idioma Predeterminado",
                    "portugues": "PortuguĂ©s",
                    "ingles": "InglĂ©s",
                    "espanhol": "EspaĂ±ol",
                    "tema": "Tema",
                    "tema-claro": "Claro",
                    "tema-escuro": "Oscuro",
                    "notif-email": "Recibir notificaciones por correo electrĂłnico",
                    "notif-push": "Recibir notificaciones push",
                    "salvar": "Guardar Cambios",
                    "cancelar": "Cancelar",
                    "sair": "Cerrar SesiĂłn",
                    "footer-texto": "Â© 2024 StudyPro. Todos los derechos reservados."
                }}
            }
        }, function(err, t) {
            // Callback executado apĂłs inicializaĂ§ĂŁo bem-sucedida
            // Atualiza imediatamente todo o conteĂșdo da pĂĄgina com traduĂ§Ă”es
            updateContent();
        });

        <!--
        ===== FUNĂĂO: ATUALIZAR CONTEĂDO DA PĂGINA =====
        Percorre todos os elementos com atributo data-i18n
        Substitui o conteĂșdo interno pelas traduĂ§Ă”es correspondentes
        Usa innerHTML para preservar formataĂ§ĂŁo HTML se necessĂĄrio
        -->
        function updateContent() {
            document.querySelectorAll('[data-i18n]').forEach(function(element) {
                const key = element.getAttribute('data-i18n');
                element.innerHTML = i18next.t(key);
            });
        }

        <!--
        ===== CONTROLE DO DROPDOWN DE IDIOMA =====
        Sistema interativo para seleĂ§ĂŁo de idioma
        Mesma implementaĂ§ĂŁo das outras pĂĄginas para consistĂȘncia
        -->
        const langToggle = document.getElementById('lang-toggle');
        const langMenu = document.getElementById('lang-menu');
        const currentLang = document.getElementById('current-lang');
        const arrow = langToggle.querySelector('.arrow');

        <!--
        EVENTO: CLIQUE NO BOTĂO DE IDIOMA
        Abre/fecha menu dropdown com animaĂ§ĂŁo visual da seta
        Previne propagaĂ§ĂŁo para evitar conflitos com outros eventos
        -->
        langToggle.addEventListener('click', function(e) {
            e.stopPropagation();
            langMenu.classList.toggle('show'); // Exibe/oculta menu
            langToggle.classList.toggle('active'); // Estilo ativo do botĂŁo

            // AnimaĂ§ĂŁo da seta: rotaĂ§ĂŁo de 90 graus quando expandido
            if (langToggle.classList.contains('active')) {
                arrow.style.transform = 'rotate(90deg)';
            } else {
                arrow.style.transform = 'rotate(0deg)';
            }
        });

        <!--
        EVENTO: SELEĂĂO DE IDIOMA
        Atualiza idioma atual e aplica mudanĂ§as em toda a interface
        Fecha automaticamente o dropdown apĂłs seleĂ§ĂŁo
        -->
        document.querySelectorAll('.lang-option').forEach(option => {
            option.addEventListener('click', function() {
                const newLang = this.getAttribute('data-lang');
                currentLang.textContent = newLang.toUpperCase(); // Atualiza indicador

                // Muda idioma no i18next e atualiza toda a pĂĄgina
                i18next.changeLanguage(newLang, function() {
                    updateContent();
                });

                // Fecha dropdown e reseta animaĂ§Ă”es
                langMenu.classList.remove('show');
                langToggle.classList.remove('active');
                arrow.style.transform = 'rotate(0deg)';
            });
        });

        <!--
        EVENTO: CLIQUE FORA DO DROPDOWN
        Fecha menu automaticamente quando usuĂĄrio clica em outro lugar
        Melhora UX evitando dropdowns abertos desnecessariamente
        -->
        document.addEventListener('click', function(e) {
            if (!langToggle.contains(e.target)) {
                langMenu.classList.remove('show');
                langToggle.classList.remove('active');
                arrow.style.transform = 'rotate(0deg)';
            }
        });

        <!--
        ===== FUNCIONALIDADE: UPLOAD DE FOTO DE PERFIL =====
        Sistema para alteraĂ§ĂŁo da imagem de perfil do usuĂĄrio
        Interface intuitiva com preview em tempo real
        -->
        <!--
        EVENTO: CLIQUE NO BOTĂO "MUDAR FOTO"
        Gatilho para abrir seletor de arquivo nativo do navegador
        Usa input oculto para melhor controle da experiĂȘncia
        -->
        document.querySelector('.btn-change-photo').addEventListener('click', function() {
            document.getElementById('photo-input').click();
        });

        <!--
        EVENTO: SELEĂĂO DE ARQUIVO DE IMAGEM
        Processa arquivo selecionado e atualiza preview
        Usa FileReader API para converter imagem em data URL
        -->
        document.getElementById('photo-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    // Atualiza src da imagem com dados do arquivo
                    document.getElementById('profile-image').src = event.target.result;
                };
                reader.readAsDataURL(file); // Converte arquivo para base64
            }
        });

        <!--
        ===== FUNCIONALIDADES DOS BOTĂES DE AĂĂO =====
        Handlers para os trĂȘs botĂ”es principais da pĂĄgina
        Cada um executa aĂ§ĂŁo especĂ­fica com feedback apropriado
        -->
        <!--
        BOTĂO SALVAR ALTERAĂĂES
        AĂ§ĂŁo primĂĄria - deveria enviar dados para servidor
        Atualmente mostra placeholder com alert (TODO: implementar backend)
        -->
        document.querySelector('.btn-primary').addEventListener('click', function() {
            alert(i18next.t('salvar') + ' clicado! Aqui vocĂȘ salvaria os dados no servidor.');
            // TODO: Implementar envio dos dados para o servidor via AJAX/fetch
        });

        <!--
        BOTĂO CANCELAR
        Descarta mudanĂ§as e retorna Ă  pĂĄgina inicial
        Redirecionamento imediato sem confirmaĂ§ĂŁo
        -->
        document.querySelector('.btn-secondary').addEventListener('click', function() {
            window.location.href = '../index.html';
        });

        <!--
        BOTĂO SAIR DA CONTA
        AĂ§ĂŁo crĂ­tica que requer confirmaĂ§ĂŁo do usuĂĄrio
        Implementa logout bĂĄsico (TODO: implementar logout completo)
        -->
        document.querySelector('.btn-danger').addEventListener('click', function() {
            if (confirm(i18next.t('sair') + '?')) {
                // TODO: Implementar logout completo (limpar sessĂŁo, cookies, etc.)
                alert('Deslogando...');
            }
        });
    </script>
</body>
