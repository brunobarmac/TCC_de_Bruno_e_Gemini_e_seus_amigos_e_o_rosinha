<!-- ================================================
     ARQUIVO: cadastro.html
     LOCALIZAÇÃO: d:\TCC\html\cadastro.html
     DESCRIÇÃO: Página de cadastro/registro do StudyPro
     FUNCIONALIDADE:
       - Formulário de criação de conta (nome, email, usuário, senha)
       - Cadastro com redes sociais (Google, Facebook, Apple)
       - Seletor multilíngue de idioma
       - Link para página de login
       - Botão para voltar à página inicial
     ================================================ -->

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!-- Metadados essenciais -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | StudyPro</title> <!-- // Título da aba do navegador -->
    
    <!-- Fonte Poppins para consistência visual -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Estilos da página de cadastro -->
    <link rel="stylesheet" href="../css/cadastro.css"> <!-- // Importa o CSS da página de cadastro -->
    
    <!-- i18next para sistema de tradução multilíngue -->
    <script src="https://unpkg.com/i18next@23.15.1/dist/umd/i18next.min.js"></script>
</head>
<body>
    <!-- CABEÇALHO COM SELETOR DE IDIOMA -->
    <header class="login-header">
        <div class="header-content">
            <!-- Logo com ícone -->
            <a href="../index.html" class="logo-link">
                <span class="brain">🧠</span> StudyPro
            </a>
            
            <!-- Dropdown de idioma -->
            <div class="language-dropdown">
                <button class="lang-btn" id="lang-toggle">
                    <span id="current-lang">PT</span>
                    <span class="arrow">▶</span>
                </button>
                <ul class="lang-menu" id="lang-menu">
                    <li><button class="lang-option" data-lang="pt">PT</button></li>
                    <li><button class="lang-option" data-lang="en">EN</button></li>
                    <li><button class="lang-option" data-lang="es">ES</button></li>
                </ul>
            </div>
        </div>
    </header>

    <div class="container"> <!-- // Container centralizado para o formulário -->
        <h1 data-i18n="cadastro-title">Crie sua conta</h1> <!-- // Título principal da página -->
        <form>
            <input type="text" placeholder="Nome completo" data-i18n-placeholder="nome-completo" required> <!-- // Campo para nome completo -->
            <input type="email" placeholder="E-mail" data-i18n-placeholder="email" required> <!-- // Campo para e-mail -->
            <input type="text" placeholder="Usuário" data-i18n-placeholder="usuario" required> <!-- // Campo para nome de usuário -->
            <input type="password" placeholder="Senha" data-i18n-placeholder="senha" required> <!-- // Campo para senha -->
            <button type="submit" data-i18n="cadastrar">Cadastrar</button> <!-- // Botão para enviar o formulário de cadastro -->
        </form>
        <div class="social-login"> <!-- // Área para cadastro social -->
            <p data-i18n="social-text">Ou cadastre-se com:</p> <!-- // Texto explicativo -->
            <button class="google-btn" type="button">
                <img src="../imagens/logo-google.webp" alt="Google"> Google <!-- // Botão de cadastro com Google -->
            </button>
            <button class="facebook-btn" type="button">
                <img src="../imagens/logo-facebook.PNG" alt="Facebook"> Facebook <!-- // Botão de cadastro com Facebook -->
            </button>
            <button class="apple-btn" type="button">
                <img src="../imagens/logo-apple.webp" alt="Apple"> Apple <!-- // Botão de cadastro com Apple -->
            </button>
        </div>
        <p data-i18n="tem-conta">Já tem uma conta?</p> <!-- // Texto para quem já tem conta -->
        <a href="login.html" class="switch-btn" data-i18n="entrar">Entrar</a> <!-- // Botão para ir para a página de login -->
        <a href="../index.html" class="back-btn" data-i18n="voltar-inicio">Voltar para a página inicial</a> <!-- // Botão para voltar à página inicial -->
    </div>

    <!-- SCRIPT: Configuração de Tradução Multilíngue -->
    <script>
        // ===== INICIALIZAÇÃO DO i18next =====
        // Configura o sistema de tradução com suporte a Português, Inglês e Espanhol
        i18next.init({
            lng: 'pt', // idioma padrão é português
            debug: false,
            resources: {
                // Traduções em Português
                pt: { translation: {
                    "cadastro-title": "Crie sua conta",
                    "nome-completo": "Nome completo",
                    "email": "E-mail",
                    "usuario": "Usuário",
                    "senha": "Senha",
                    "cadastrar": "Cadastrar",
                    "social-text": "Ou cadastre-se com:",
                    "tem-conta": "Já tem uma conta?",
                    "entrar": "Entrar",
                    "voltar-inicio": "Voltar para a página inicial"
                }},
                // Traduções em Inglês
                en: { translation: {
                    "cadastro-title": "Create Your Account",
                    "nome-completo": "Full Name",
                    "email": "Email",
                    "usuario": "Username",
                    "senha": "Password",
                    "cadastrar": "Sign Up",
                    "social-text": "Or sign up with:",
                    "tem-conta": "Already have an account?",
                    "entrar": "Sign In",
                    "voltar-inicio": "Back to homepage"
                }},
                // Traduções em Espanhol
                es: { translation: {
                    "cadastro-title": "Crea tu cuenta",
                    "nome-completo": "Nombre Completo",
                    "email": "Correo Electrónico",
                    "usuario": "Nombre de Usuario",
                    "senha": "Contraseña",
                    "cadastrar": "Registrarse",
                    "social-text": "O regístrate con:",
                    "tem-conta": "¿Ya tienes cuenta?",
                    "entrar": "Inicia Sesión",
                    "voltar-inicio": "Volver a la página de inicio"
                }}
            }
        }, function(err, t) {
            updateContent();
        });

        // ===== FUNÇÃO: Atualizar Conteúdo da Página =====
        function updateContent() {
            // Atualiza textos com data-i18n
            document.querySelectorAll('[data-i18n]').forEach(function(element) {
                const key = element.getAttribute('data-i18n');
                element.textContent = i18next.t(key);
            });

            // Atualiza placeholders com data-i18n-placeholder
            document.querySelectorAll('[data-i18n-placeholder]').forEach(function(element) {
                const key = element.getAttribute('data-i18n-placeholder');
                element.placeholder = i18next.t(key);
            });
        }

        // ===== CONTROLE DO DROPDOWN DE IDIOMA =====
        const langToggle = document.getElementById('lang-toggle');
        const langMenu = document.getElementById('lang-menu');
        const currentLang = document.getElementById('current-lang');
        const arrow = langToggle.querySelector('.arrow');

        // Clique no botão de idioma: abre/fecha menu
        langToggle.addEventListener('click', function(e) {
            e.stopPropagation();
            langMenu.classList.toggle('show');
            langToggle.classList.toggle('active');
            if (langToggle.classList.contains('active')) {
                arrow.style.transform = 'rotate(90deg)';
            } else {
                arrow.style.transform = 'rotate(0deg)';
            }
        });

        // Clique em uma opção de idioma
        document.querySelectorAll('.lang-option').forEach(option => {
            option.addEventListener('click', function() {
                const newLang = this.getAttribute('data-lang');
                currentLang.textContent = newLang.toUpperCase();
                i18next.changeLanguage(newLang, function() {
                    updateContent();
                });
                langMenu.classList.remove('show');
                langToggle.classList.remove('active');
                arrow.style.transform = 'rotate(0deg)';
            });
        });

        // Clique fora fecha o dropdown
        document.addEventListener('click', function(e) {
            if (!langToggle.contains(e.target) && !langMenu.contains(e.target)) {
                langMenu.classList.remove('show');
                langToggle.classList.remove('active');
                arrow.style.transform = 'rotate(0deg)';
            }
        });
    </script>
</body>
</html>
