        /**

         * 4. Mostra seĂ§ĂŁo quiz, oculta resultados
         * 5. Carrega primeira questĂŁo (ou questĂŁo especĂ­fica)
         * 6. Inicia contagem do timer
         */
        function init() {
            // Verifica se hĂĄ uma questĂŁo especĂ­fica para carregar (vinda de favoritos)
            const goToQuestion = sessionStorage.getItem('goToQuestion');
            currentQuestionIndex = goToQuestion ? parseInt(goToQuestion) : 0;
            sessionStorage.removeItem('goToQuestion'); // Limpa apĂłs usar
            
            userAnswers = [];
            totalTime = 0;
            quizContainer.style.display = 'block';
            resultsContainer.style.display = 'none';
            createQuestionNav();
            loadQuestion(currentQuestionIndex);
            startTimer();
        }

        /**
         * FUNĂĂO: getQuestion(index)
         * PROPĂSITO: Retorna a questĂŁo no idioma atual
         * PARĂMETRO: index = nĂşmero da questĂŁo (0-14)
         * RETORNA: { question: "...", explanation: "..." } no idioma selecionado
         */
        function getQuestion(index) {
            return questionsData[index][currentLang];
        }

        /**
         * FUNĂĂO: getOptions(index)
         * PROPĂSITO: Retorna as 4 opĂ§Ăľes da questĂŁo no idioma atual
         * PARĂMETRO: index = nĂşmero da questĂŁo (0-14)
         * RETORNA: Array com 4 strings (as 4 opĂ§Ăľes)
         */
        function getOptions(index) {
            return questionsData[index].options[currentLang];
        }

        /**
         * FUNĂĂO: loadQuestion(index)
         * PROPĂSITO: Carrega e exibe uma questĂŁo na tela
         * PARĂMETRO: index = nĂşmero da questĂŁo (0-14)
         * 
         * O que faz:
         * 1. Pega dados da questĂŁo
         * 2. Define nĂşmeros da questĂŁo (1, 2, 3...)
         * 3. Define texto da questĂŁo
         * 4. Cria 4 botĂľes de opĂ§ĂŁo (A, B, C, D)
         * 5. Oculta feedback anterior
         * 6. Atualiza barra de progresso
         */
        function loadQuestion(index) {
            const questionData = questionsData[index];
            const currentQData = getQuestion(index);
            const options = getOptions(index);

            // Exibe "QuestĂŁo 1", "QuestĂŁo 2", etc
            qNumber.textContent = index + 1;
            questionCounter.textContent = index + 1;
            questionText.textContent = currentQData.question;

            // Limpa opĂ§Ăľes antigas
            optionsContainer.innerHTML = '';
            
            // Para cada uma das 4 opĂ§Ăľes, cria um botĂŁo (A, B, C, D)
            options.forEach((option, optionIndex) => {
                const optionElement = document.createElement('div');
                optionElement.className = 'option';
                optionElement.innerHTML = `
                    <span class="option-letter">${String.fromCharCode(65 + optionIndex)}</span>
                    <span class="option-text">${option}</span>
                `;
                optionElement.addEventListener('click', () => selectOption(optionIndex, index));
                optionsContainer.appendChild(optionElement);
            });

            // Verifica se questĂŁo jĂĄ foi respondida antes
            const answeredIndex = userAnswers[index];
            if (typeof answeredIndex !== 'undefined') {
                // MantĂŠm opĂ§Ăľes com feedback e bloqueia mudanĂ§as

                    } else if (cardIndex === answeredIndex) {
                        card.classList.add('incorrect');
                    }
                });
                feedbackDiv.style.display = 'block';
                const isCorrect = answeredIndex === questionsData[index].correct;
                feedbackResult.className = `feedback-result ${isCorrect ? 'correct' : 'incorrect'}`;
                feedbackResult.innerHTML = `
                    <i class="fas fa-${isCorrect ? 'check' : 'times'}-circle"></i>
                    <span>${isCorrect ? 'Correto!' : 'Incorreto!'}</span>
                `;
                explanationDiv.innerHTML = `<strong>ExplicaĂ§ĂŁo:</strong> ${currentQData.explanation}`;
            } else {
                feedbackDiv.style.display = 'none';
            }

            // Atualiza barra de progresso visual
            updateProgressBar();
            updateQuestionNavUI();
            updateNavigationButtons();
            
            // Atualiza estado do botĂŁo de favoritar
            updateFavoriteButton();
        }

        /**
         * FUNĂĂO: createQuestionNav()
         * PROPĂSITO: Gera 15 mini quadradinhos para pular entre questĂľes
         * DESCRIĂĂO: Cria 15 botĂľes numerados (1..15), cada um com evento de clique
         * para ir diretamente Ă quela pergunta. Usado para controle rĂĄpido do usuĂĄrio.
         */
        function createQuestionNav() {
            // Limpa nav anterior (caso esteja reiniciando quiz)
            questionNav.innerHTML = '';

            // Cria cada botĂŁo de questĂŁo
            questionsData.forEach((_, idx) => {
                const item = document.createElement('button');
                item.className = 'nav-item';
                item.textContent = idx + 1;

                // Clicar no quadradinho leva para a questĂŁo indexada
                item.addEventListener('click', () => {
                    currentQuestionIndex = idx;
                    loadQuestion(currentQuestionIndex);
                });

                questionNav.appendChild(item);
            });

            // Atualiza estilos de estado (ativo/respondido) e botĂľes de navegaĂ§ĂŁo
            updateQuestionNavUI();
            updateNavigationButtons();
        }

        /**
         * FUNĂĂO: updateQuestionNavUI()
         * PROPĂSITO: Atualiza cores/estados dos quadradinhos de navegaĂ§ĂŁo
         */
        function updateQuestionNavUI() {
            const items = questionNav.querySelectorAll('.nav-item');
            items.forEach((item, idx) => {
                item.classList.remove('current', 'answered');
                if (idx === currentQuestionIndex) item.classList.add('current');
                if (typeof userAnswers[idx] !== 'undefined') item.classList.add('answered');
            });
            finishBtn.disabled = userAnswers.filter((ans) => typeof ans !== 'undefined').length !== questionsData.length;
        }

        /**
         * FUNĂĂO: updateNavigationButtons()
         * PROPĂSITO: Ativa/desativa botĂľes Anterior/PrĂłxima
         */
        function updateNavigationButtons() {
            prevBtn.disabled = currentQuestionIndex === 0;
            nextBtn.disabled = currentQuestionIndex === questionsData.length - 1;
        }

        /**
         * FUNĂĂO: selectOption(optionIndex, questionIndex)
         * PROPĂSITO: Processa a resposta do usuĂĄrio
         * 
         * O que faz:
         * 1. Verifica se resposta estĂĄ correta
         * 2. Armazena resposta em userAnswers[]
         * 3. Destaca: verde (correta), vermelho (incorreta)
         * 4. Mostra feedback e explicaĂ§ĂŁo
         * 5. Desabilita cliques
         * 6. Aguarda 2 segundos
         * 7. AvanĂ§a automaticamente para prĂłxima ou mostra resultados
         */
        /**
         * FUNĂĂO: selectOption(optionIndex, questionIndex)
         * PROPĂSITO: Processa a resposta do usuĂĄrio quando clica em uma opĂ§ĂŁo
         * PARĂMETROS:
         *   - optionIndex: Ă­ndice da opĂ§ĂŁo clicada (0=A, 1=B, 2=C, 3=D)
         *   - questionIndex: Ă­ndice da questĂŁo atual (0-14)
         *
         * O que faz:
         * 1. Verifica se resposta estĂĄ correta comparando com gabarito
         * 2. Armazena resposta em userAnswers[] para cĂĄlculo posterior
         * 3. Destaca visualmente: verde (correta), vermelho (incorreta)
         * 4. Mostra feedback e explicaĂ§ĂŁo detalhada
         * 5. Desabilita demais cliques nesta questĂŁo
         * 6. Aguarda 2 segundos
         * 7. AvanĂ§a automaticamente para prĂłxima questĂŁo ou exibe resultados
         */
        function selectOption(optionIndex, questionIndex) {
            // Verifica se a opĂ§ĂŁo clicada ĂŠ a resposta correta
            const isCorrect = optionIndex === questionsData[questionIndex].correct;
            
            // Armazena a resposta para calcular pontuaĂ§ĂŁo depois
            userAnswers[questionIndex] = optionIndex;

            // Destaque visual das opĂ§Ăľes
            const options = document.querySelectorAll('.option');
            options.forEach((opt, index) => {
                opt.classList.remove('selected', 'correct', 'incorrect');
                // Verde: opĂ§ĂŁo correta
                if (index === questionsData[questionIndex].correct) {
                    opt.classList.add('correct');
                } else if (index === optionIndex && !isCorrect) {
                    opt.classList.add('incorrect');
                }
                opt.style.pointerEvents = 'none';
            });

            // Feedback visual (Ă­cone + texto)
            feedbackDiv.style.display = 'block';
            feedbackResult.className = `feedback-result ${isCorrect ? 'correct' : 'incorrect'}`;
            feedbackResult.innerHTML = `
                <i class="fas fa-${isCorrect ? 'check' : 'times'}-circle"></i>
                <span>${isCorrect ? 'Correto!' : 'Incorreto!'}</span>
            `;
            
            // ExplicaĂ§ĂŁo detalhada da resposta
            explanationDiv.innerHTML = `<strong>ExplicaĂ§ĂŁo:</strong> ${getQuestion(questionIndex).explanation}`;

            // Atualiza a navegaĂ§ĂŁo (marcar pergunta como respondida) e enable/disable dos botĂľes
            updateQuestionNavUI();
            updateNavigationButtons();

            // NĂŁo realiza auto-avanĂ§amento. UsuĂĄrio usa os quadradinhos ou botĂľes.
        }

        /**
         * FUNĂĂO: updateProgressBar()
         * PROPĂSITO: Atualiza a barra de progresso visual do quiz
         *
         * FĂłrmula: (questĂŁo atual + 1) / total de questĂľes * 100
         * 
         * Exemplos:
         *   - QuestĂŁo 1 de 15: (0 + 1) / 15 * 100 = 6.67% preenchida
         *   - QuestĂŁo 8 de 15: (7 + 1) / 15 * 100 = 53.33% preenchida
         *   - QuestĂŁo 15 de 15: (14 + 1) / 15 * 100 = 100% preenchida
         */
        function updateProgressBar() {
            const progress = ((currentQuestionIndex + 1) / questionsData.length) * 100;
            progressFill.style.width = progress + '%';
        }

        /**
         * FUNĂĂO: startTimer()
         * PROPĂSITO: Inicia a contagem de tempo do quiz
         * 
         * O que faz:
         * 1. Cancela qualquer timer anterior (se existir)
         * 2. Configura um intervalo que executa a cada 1000ms (1 segundo)
         * 3. A cada segundo: incrementa totalTime em 1
         * 4. Converte segundos para formato MM:SS (00:45, 01:30, 02:15, etc)
         * 5. Exibe tempo no elemento timerDisplay
         *
         * Detalhes tĂŠcnicos:
         * - Math.floor(totalTime / 60) = nĂşmero de minutos completos
         * - totalTime % 60 = nĂşmero de segundos restantes
         * - .padStart(2, '0') = garante 2 dĂ­gitos (01, 02... 59)
         */
        function startTimer() {
            // Se houver timer ativo, cancela antes de criar novo
            if (timerInterval) clearInterval(timerInterval);
            
            // Intervalo que executa a cada 1 segundo (1000ms)
            timerInterval = setInterval(() => {
                // Incrementa 1 segundo ao tempo total
                totalTime++;
                
                // Calcula minutos e segundos
                const mins = Math.floor(totalTime / 60);
                const secs = totalTime % 60;
                
                // Exibe no formato MM:SS (ex: 00:45, 01:30)
                timerDisplay.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
            }, 1000);
        }

        /**
         * FUNĂĂO: showResults()
         * PROPĂSITO: Exibe a tela de resultados finais do quiz
         * 
         * O que faz:
         * 1. Para o timer de contagem de tempo
         * 2. Oculta seĂ§ĂŁo de quiz, mostra seĂ§ĂŁo de resultados
         * 3. Calcula nĂşmero total de acertos
         * 4. Calcula percentual de desempenho (0-100%)
         * 5. Salva dados em localStorage para histĂłrico (usado em desempenho.html)
         * 6. Chama updateResultsUI() para exibir valores na tela
         *
         * Dados salvos em localStorage:
         * - date: data/hora em formato ISO (para grĂĄficos de histĂłrico)
         * - correct: nĂşmero de acertos (ex: 12)
         * - time: tempo total em segundos (ex: 245)
         * - subject: sempre 'historia' para este quiz
         * - score: percentual de acerto (ex: 80)
         */
        function showResults() {
            // Para a contagem do timer
            clearInterval(timerInterval);
            
            // Oculta quiz, mostra tela de resultados
            quizContainer.style.display = 'none';
            resultsContainer.style.display = 'block';

            /**
             * CĂLCULO DE ACERTOS:
             * .filter() compara cada resposta com a correta
             * userAnswers[idx] === questionsData[idx].correct
             * .length conta quantos acertos houve
             */
            const correctCount = userAnswers.filter((ans, idx) => ans === questionsData[idx].correct).length;
            
            // Calcula percentual: acertos / total * 100
            const percentage = Math.round((correctCount / questionsData.length) * 100);

            /**
             * SALVAR DESEMPENHO em localStorage
             * Permite que pĂĄgina de desempenho.html visualize o histĂłrico
             * Cada quiz respondido adiciona um objeto ao array
             */
            const performanceHistory = JSON.parse(localStorage.getItem('studyPro_performance') || '[]');
            performanceHistory.push({
                date: new Date().toISOString(),      // Data/hora atual (ISO format)
                correct: correctCount,                // NĂşmero de acertos (ex: 12 de 15)
                time: totalTime,                      // Tempo total em segundos
                subject: 'historia',                  // Disciplina (histĂłria)
                score: percentage                     // Percentual (0-100)
            });

            // Salva histĂłrico de desempenho
            localStorage.setItem('studyPro_performance', JSON.stringify(performanceHistory));

            // Atualiza dados de progresso global (XP, fases, quizzes concluidos)
            const progressData = JSON.parse(localStorage.getItem('studyPro_progress') || '{}');
            progressData.xp = (progressData.xp || 0) + (correctCount * 10); // 10 XP por acerto
            progressData.completedQuizzes = (progressData.completedQuizzes || 0) + 1;
            progressData.unlockedPhases = Math.min(
                10,
                Math.max(progressData.unlockedPhases || 1, Math.floor(progressData.completedQuizzes / 2) + 1)
            );
            progressData.lastSession = new Date().toISOString();
            localStorage.setItem('studyPro_progress', JSON.stringify(progressData));

            // Atualiza elementos HTML com valores dos resultados
            updateResultsUI();
        }

        /**
         * FUNĂĂO: updateResultsUI()
         * PROPĂSITO: Atualiza elementos visuais com dados dos resultados finais
         * 
         * O que faz:
         * 1. Calcula nĂşmero de acertos comparando com gabarito
         * 2. Calcula percentual de desempenho (0-100%)
         * 3. Converte tempo em segundos para formato MM:SS
         * 4. Atualiza elementos HTML com os valores calculados
         * 5. Exibe mensagem motivacional baseada na pontuaĂ§ĂŁo
         *
         * Mensagens motivacionais:
         * - >= 90%: "Excelente!" (green)
         * - 70-89%: "Bom!" (blue)
         * - 50-69%: "Regular" (yellow)
         * - < 50%: "Insuficiente" (red)
         */
        function updateResultsUI() {
            // Calcula nĂşmero de acertos (conta quantas respostas conferiram com o gabarito)
            const correctCount = userAnswers.filter((ans, idx) => ans === questionsData[idx].correct).length;
            
            // Calcula percentual de acerto: acertos / total * 100, arredonda para inteiro
            const percentage = Math.round((correctCount / questionsData.length) * 100);
            
            // Converte tempo em segundos para minutos:segundos
            // Ex: 245 segundos = 4 minutos e 5 segundos
            const mins = Math.floor(totalTime / 60);
            const secs = totalTime % 60;

            // Atualiza elemento que mostra o percentual (0-100)
            document.getElementById('score-percentage').textContent = percentage;
            
            // Atualiza elemento que mostra nĂşmero de acertos (ex: "12" em "12 de 15")
            document.getElementById('correct-answers').textContent = correctCount;
            
            // Atualiza elemento que mostra tempo total (ex: "04:05")
            document.getElementById('total-time').textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;

            /**
             * MENSAGEM MOTIVACIONAL
             * Baseada no percentual, exibe feedback positivo e encorajador
             * Usa i18next para suportar mĂşltiplos idiomas
             */
            let message = '';
            if (percentage >= 90) message = i18next.t('excelente');              // >= 90%: "Excelente!"
            else if (percentage >= 70) message = i18next.t('bom');               // 70-89%: "Bom!"
            else if (percentage >= 50) message = i18next.t('regular');           // 50-69%: "Regular"
            else message = i18next.t('insuficiente');                            // < 50%: "Insuficiente"
            
            // Exibe a mensagem na tela
            document.getElementById('performance-message').textContent = message;
        }

        /**
         * FUNĂĂO: retryQuiz()
         * PROPĂSITO: Reinicia o quiz igual ao inĂ­cio
         * 
         * O que faz:
         * Chama init() que reseta todos os valores e comeĂ§a um novo quiz:
         * - Volta para questĂŁo 1
         * - Limpa respostas anteriores
         * - Reseta timer
         * - Oculta tela de resultados
         * - Inicia novo timer de contagem
         */
        function retryQuiz() {
            init();
        }

        /**
         * FUNĂĂO: toggleFavorite()
         * PROPĂSITO: Adiciona ou remove uma questĂŁo da lista de favoritos
         * 
         * O que faz:
         * - Verifica se a questĂŁo jĂĄ estĂĄ nos favoritos
         * - Se estĂĄ: remove da lista
         * - Se nĂŁo estĂĄ: adiciona Ă  lista com dados completos
         * - Atualiza localStorage
         * - Atualiza visual do botĂŁo (estrela vazia ou preenchida)
         */
        function toggleFavorite(questionIndex) {
            // Dados da questĂŁo atual
            const question = questionsData[questionIndex];
            const currentLangKey = currentLang; // 'pt', 'en' ou 'es'
            
            // Procura se a questĂŁo jĂĄ estĂĄ nos favoritos por Ă­ndice
            const existingIndex = favoriteQuestions.findIndex(fav => fav.questionIndex === questionIndex);
            
            if (existingIndex === -1) {
                // NĂŁo estĂĄ favoritada: adiciona Ă  lista com dados completos
                const favoriteData = {
                    questionIndex: questionIndex,
                    id: `questionario_${questionIndex}`,
                    question: question[currentLangKey].question,
                    options: question.options[currentLangKey],
                    correct: question.correct,
                    explanation: question[currentLangKey].explanation
                };
                favoriteQuestions.push(favoriteData);
                btnFavorite.classList.add('favorited');
            } else {
                // JĂĄ estĂĄ favoritada: remove da lista
                favoriteQuestions.splice(existingIndex, 1);
                btnFavorite.classList.remove('favorited');
            }
            
            // Salva no localStorage
            localStorage.setItem('studyPro_favorites', JSON.stringify(favoriteQuestions));
        }

        /**
         * FUNĂĂO: updateFavoriteButton()
         * PROPĂSITO: Atualiza o estado visual do botĂŁo de favoritar
         * 
         * Verifica se a questĂŁo atual ĂŠ favoritada e muda o Ă­cone
         * Deve ser chamada ao carregar cada questĂŁo
         */
        function updateFavoriteButton() {
            const isFavorited = favoriteQuestions.some(fav => fav.questionIndex === currentQuestionIndex);
            if (isFavorited) {
                btnFavorite.classList.add('favorited');
                btnFavorite.innerHTML = '<i class="fas fa-star"></i>';
            } else {
                btnFavorite.classList.remove('favorited');
                btnFavorite.innerHTML = '<i class="far fa-star"></i>';
            }
        }

        /**
         * ================================================================================
         *    MODAL DE CONFIRMAĂĂO - SAIR DO QUIZ
         * ================================================================================
         * 
         * Sistema de confirmaĂ§ĂŁo customizado para quando o usuĂĄrio tenta sair
         * Mostra um modal bonito no centro da tela ao invĂŠs do alert/confirm do navegador
         */

        /**
         * FUNĂĂO: showExitModal()
         * PROPĂSITO: Exibe o modal de confirmaĂ§ĂŁo de saĂ­da
         * 
         * Mostra o overlay (fundo escuro) e o modal (caixa branca)
         * Permite que o usuĂĄrio confirme ou cancele a aĂ§ĂŁo de sair
         */
        function showExitModal() {
            // Seleciona os elementos do modal
            const modalOverlay = document.getElementById('modal-overlay');
            const modalDialog = document.getElementById('modal-dialog');
            const modalCancel = document.getElementById('modal-cancel');
            const modalConfirm = document.getElementById('modal-confirm');

            // Mostra o overlay e o modal (muda de display: none para display: flex/block)
            modalOverlay.style.display = 'flex';
            modalDialog.style.display = 'block';

            /**
             * BOTĂO CANCELAR (Continuar Respondendo)
             * Quando clica, fecha o modal e volta ao quiz
             */
            modalCancel.addEventListener('click', function() {
                hideExitModal();
            });

            /**
             * BOTĂO CONFIRMAR (Sair Mesmo Assim)
             * Quando clica, deixa sair e volta Ă  pĂĄgina inicial
             */
            modalConfirm.addEventListener('click', function() {
                window.history.back();
            });

            /**
             * FECHAR AO CLICAR NO OVERLAY (fundo preto)
             * Se o usuĂĄrio clicar fora do modal, ele fecha
             * Isso oferece uma forma adicional de cancelar
             */
            modalOverlay.addEventListener('click', function(event) {
                // Verifica se clicou no overlay exatamente, nĂŁo no modal
                if (event.target === modalOverlay) {
                    hideExitModal();
                }
            });
        }

        /**
         * FUNĂĂO: hideExitModal()
         * PROPĂSITO: Fecha o modal de confirmaĂ§ĂŁo
         * 
         * Esconde o overlay e o modal voltando ao quiz
         */
        function hideExitModal() {
            // Seleciona os elementos do modal
            const modalOverlay = document.getElementById('modal-overlay');
            const modalDialog = document.getElementById('modal-dialog');

            // Remove os listeners de clique dos botĂľes para evitar duplicaĂ§ĂŁo
            const modalCancel = document.getElementById('modal-cancel');
            const modalConfirm = document.getElementById('modal-confirm');
            
            // Clona os elementos para remover todos os listeners anteriores
            const newCancel = modalCancel.cloneNode(true);
            const newConfirm = modalConfirm.cloneNode(true);
            modalCancel.parentNode.replaceChild(newCancel, modalCancel);
            modalConfirm.parentNode.replaceChild(newConfirm, modalConfirm);

            // Esconde o overlay e o modal
            modalOverlay.style.display = 'none';
            modalDialog.style.display = 'none';
        }
    </script>
