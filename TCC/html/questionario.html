<!-- 
================================================================================
    DESAFIO HISTÓRICO - StudyPro
================================================================================
    DESCRIÇÃO: Sistema de Quiz interativo sobre História
    FUNCIONALIDADES:
    • 15 questões históricas em 3 idiomas (PT/EN/ES)
    • Tradução completa (perguntas, opções, explicações)
    • Auto-avance automático após seleção (REMOVIDO: navegação manual via botões e quadradinhos)
    • Contabilização de desempenho em tempo real
    • Integração com sistema de desempenho global
    • Design responsivo e tema profissional histórico
================================================================================
-->

<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <!-- Configurações básicas do documento -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Desafio Histórico - Teste seus conhecimentos sobre História">
    <title>Desafio Histórico - StudyPro</title>

    <!-- Importar fontes do Google Fonts (Merriweather para títulos históricos, Poppins para corpo) -->
    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- Stylesheet do quiz (estilos específicos desta página) -->
    <link rel="stylesheet" href="../css/questionario.css">

    <!-- Font Awesome para ícones (check, times, clock, etc) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        integrity="sha512-papd4gzXrh8A+X2oWcH6yZqsQ9s7eEClw6sY2I1uJvZ1LIQGZC8YVoSHWpsKcUVp8QLYJ0MWXK5y+Y61cY9cYw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Biblioteca i18next para tradução/internacionalização multilíngue -->
    <script src="https://unpkg.com/i18next@23.15.1/dist/umd/i18next.min.js"></script>
    <script type="module" src="/TCC/scripts/questionario.js"></script>
</head>

<body>
    <!-- 
    ================================================================================
        CABEÇALHO (HEADER) - Topo da página com logo, idioma e botão voltar
    ================================================================================
    -->
    <header>
        <div class="main-header">
            <!-- Logo do site com emoji de livro -->
            <div class="logo">
                <span class="brain">📚</span> Desafio Histórico
            </div>

            <!-- Área direita do cabeçalho: seletor de idioma e botão voltar -->
            <div class="header-right">
                <!-- 
                DROPDOWN DE IDIOMA
                Permite alternar entre Português, Inglês e Espanhol
                Não reinicia a página, muda os textos em tempo real
                -->
                <div class="language-dropdown">
                    <button class="lang-btn" id="lang-toggle">
                        <!-- Exibe idioma atual (PT/EN/ES) -->
                        <span id="current-lang">PT</span>
                        <span class="arrow">▶</span>
                    </button>
                    <!-- Menu suspenso com opções de idioma -->
                    <ul class="lang-menu" id="lang-menu">
                        <li><button class="lang-option" data-lang="pt">🇧🇷 PT</button></li>
                        <li><button class="lang-option" data-lang="en">🇺🇸 EN</button></li>
                        <li><button class="lang-option" data-lang="es">🇪🇸 ES</button></li>
                    </ul>
                </div>

                <!-- Botão voltar à página anterior com confirmação -->
                <button class="btn back-btn" id="back-btn">← Voltar</button>
            </div>
        </div>
    </header>

    <main>
        <!-- 
        ================================================================================
            SEÇÃO QUIZ - Exibe questões e permite ao usuário responder
        ================================================================================
        -->
        <section class="quiz-section" id="quiz-container">
            <!-- 
            CABEÇALHO DO QUIZ
            Inclui título, número da questão atual, total de questões e timer
            -->
            <div class="quiz-header">
                <h1 id="quiz-title">Desafio Histórico</h1>
                <div class="quiz-info">
                    <!-- Badge mostrando: questão atual / total de questões -->
                    <span class="badge progress-badge">
                        <span id="question-counter">1</span>/<span id="total-questions">15</span>
                    </span>
                    <!-- Timer em tempo real mostrando tempo decorrido -->
                    <span class="timer">
                        <i class="fas fa-hourglass-end"></i>
                        <span id="timer-display">00:00</span>
                    </span>
                </div>
            </div>

            <!-- 
            BARRA DE PROGRESSO
            Mostra visualmente quantas questões foram respondidas
            Preenchimento aumenta conforme avança nas questões
            -->
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>

            <!-- NAVEGAÇÃO RÁPIDA POR QUESTÕES (15 quadradinhos) -->
            <div class="question-nav" id="question-nav"></div>

            <!-- BOTÕES DE NAVEGAÇÃO (Anterior / Próxima / Resultados) -->
            <div class="nav-actions">
                <button class="btn secondary" id="prev-btn">← Anterior</button>
                <button class="btn secondary" id="next-btn">Próxima →</button>
                <button class="btn primary" id="finish-btn" disabled>Ver Resultados</button>
            </div>

            <!-- 
            CARD DA QUESTÃO
            Contém o texto da pergunta e as opções de resposta
            É atualizado dinamicamente com cada nova questão
            -->
            <div class="question-card">
                <!-- Cabeçalho do card com número e botão de favoritar -->
                <div class="question-card-header">
                    <!-- Número da questão atual -->
                    <div class="question-number">Questão <span id="q-number">1</span></div>

                    <!-- Botão para salvar como favorita -->
                    <button class="btn-favorite" id="btn-favorite" title="Favoritar questão">
                        <i class="far fa-star"></i>
                    </button>
                </div>

                <!-- Texto da pergunta (muda conforme o idioma selecionado) -->
                <h2 class="question-text" id="question-text"></h2>

                <!-- 
                CONTAINER DE OPÇÕES
                Será preenchido dinamicamente com 4 botões de opções (A, B, C, D)
                Cada opção pode ser clicada para responder
                -->
                <div class="options-container" id="options-container"></div>
            </div>

            <!-- 
            FEEDBACK DA RESPOSTA
            Mostra se a resposta foi correta/incorreta e exibe a explicação
            Aparece após clicar em uma opção por 2 segundos
            -->
            <div class="feedback" id="feedback" style="display: none;">
                <!-- Resultado (Correto! ou Incorreto!) com ícone -->
                <div class="feedback-result" id="feedback-result"></div>
                <!-- Explicação detalhada da resposta correta -->
                <div class="explanation" id="explanation"></div>
            </div>
        </section>

        <!-- 
        ================================================================================
            SEÇÃO RESULTADOS - Mostra desempenho final após conclusão do quiz
        ================================================================================
        -->
        <section class="results-section" id="results-container" style="display: none;">
            <div class="results-card">
                <!-- Cabeçalho dos resultados -->
                <div class="results-header">
                    <h2 id="results-title">Seus Resultados</h2>
                    <p id="results-subtitle">Parabéns por completar o desafio!</p>
                </div>

                <!-- 
                EXIBIÇÃO DE PONTUAÇÃO
                Inclui: círculo com percentual, acertos/total e tempo total
                -->
                <div class="score-display">
                    <!-- Círculo com percentual em forma de progresso visual -->
                    <div class="score-circle">
                        <span class="score-percentage" id="score-percentage">0%</span>
                        <div class="score-label">Desempenho</div>
                    </div>

                    <!-- Estatísticas detalhadas (acertos e tempo) -->
                    <div class="score-details">
                        <!-- Número de acertos em formato X/15 -->
                        <div class="stat-item">
                            <i class="fas fa-check-circle"></i>
                            <div>
                                <span class="stat-label">Acertos</span>
                                <span class="stat-value"><span id="correct-answers">0</span>/15</span>
                            </div>
                        </div>
                        <!-- Tempo total gasto no quiz -->
                        <div class="stat-item">
                            <i class="fas fa-clock"></i>
                            <div>
                                <span class="stat-label">Tempo Total</span>
                                <span class="stat-value"><span id="total-time">00:00</span></span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Mensagem personalizada baseada no desempenho (Excelente/Bom/Regular/Insuficiente) -->
                <div class="performance-message" id="performance-message"></div>

                <!-- 
                BOTÕES DE AÇÃO
                Permite tentar novamente ou visualizar histórico de desempenho
                -->
                <div class="results-actions">
                    <button class="btn secondary" id="retry-btn">
                        <i class="fas fa-redo"></i> Tentar Novamente
                    </button>
                    <button class="btn primary" id="view-performance-btn">
                        <i class="fas fa-chart-line"></i> Ver Desempenho
                    </button>
                </div>
            </div>
        </section>
    </main>

    <!-- 
    ================================================================================
        MODAL DE CONFIRMAÇÃO - Ao sair do quiz
    ================================================================================
    -->
    <div class="modal-overlay" id="modal-overlay" style="display: none;"></div>
    <div class="modal-dialog" id="modal-dialog" style="display: none;">
        <div class="modal-content">
            <!-- Ícone de aviso -->
            <div class="modal-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>

            <!-- Título -->
            <h3 class="modal-title">Tem certeza que deseja sair?</h3>

            <!-- Mensagem descritiva -->
            <p class="modal-message">
                Você perderá todo o progresso do quiz! Os dados não foram salvos.
                <br><br>
                <strong>Tem certeza que quer continuar?</strong>
            </p>

            <!-- Botões de ação -->
            <div class="modal-actions">
                <button class="modal-btn cancel-btn" id="modal-cancel">
                    Continuar Respondendo
                </button>
                <button class="modal-btn confirm-btn" id="modal-confirm">
                    Sair Mesmo Assim
                </button>
            </div>
        </div>
    </div>
</body>
</html>
