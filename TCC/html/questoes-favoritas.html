    <!--
    ================================================================================

    Ărea central da pĂĄgina com tĂ­tulo, descriĂ§ĂŁo e lista de favoritos
    ================================================================================
    -->
    <main>
        <!--
        TĂTULO DA PĂGINA
        CabeĂ§alho principal explicando propĂłsito da pĂĄgina
        Texto traduzĂ­vel para suporte multilĂ­ngue
        -->
        <h1 data-i18n="favoritas-title">Suas QuestĂ”es Favoritas</h1>

        <!--
        DESCRIĂĂO EXPLICATIVA
        Texto descritivo sobre a funcionalidade da pĂĄgina
        Orienta usuĂĄrio sobre o que encontrar na seĂ§ĂŁo
        -->
        <p data-i18n="favoritas-desc">Aqui estĂŁo todas as questĂ”es que vocĂȘ marcou para revisar mais tarde.</p>

        <!--
        CONTAINER DA LISTA DE FAVORITOS
        Ărea onde os cards de questĂ”es favoritas serĂŁo renderizados dinamicamente
        JavaScript popula este container com dados do localStorage

        <div class="favorites-list" id="favorites-list">

        </div>
    </main>

    <footer>

        <p>
            <a href="#" data-i18n="privacy">PolĂ­tica de Privacidade</a> |
            <a href="#" data-i18n="terms">Termos de Uso</a> |
            <a href="#" data-i18n="contact">Contato</a>
        </p>
    </footer>

    <!--
    ================================================================================
    SEĂĂO: JAVASCRIPT - FUNCIONALIDADES DINĂMICAS
    Gerenciamento de questĂ”es favoritas e interatividade da pĂĄgina
    ================================================================================
    -->
    <script>
        /*
        ===== CONFIGURAĂĂO INICIAL E VARIĂVEIS GLOBAIS =====
        Carregamento de dados persistentes do localStorage
        Estado da aplicaĂ§ĂŁo para gerenciamento de favoritos
        */
        let favorites = JSON.parse(localStorage.getItem('studyPro_favorites') || '[]'); // Array de questĂ”es favoritas

        /*
        ===== INICIALIZAĂĂO DO SISTEMA DE TRADUĂĂO (i18next) =====
        ConfiguraĂ§ĂŁo completa do sistema multilĂ­ngue
        Suporte a portuguĂȘs, inglĂȘs e espanhol com recursos especĂ­ficos da pĂĄgina
        Callback para carregamento inicial dos dados apĂłs traduĂ§ĂŁo
        */
        i18next.init({
            lng: localStorage.getItem('studyPro_lang') || 'pt', // Idioma salvo ou padrĂŁo portuguĂȘs
            debug: false, // Modo debug desabilitado para produĂ§ĂŁo
            resources: {
                // ===== RECURSOS DE TRADUĂĂO EM PORTUGUĂS =====
                pt: { translation: {
                    "voltar": "Voltar",
                    "questionario": "QuestionĂĄrio",
                    "questoes-favoritas": "QuestĂ”es favoritas",
                    "desempenho": "Desempenho",
                    "sala-trofeus": "Sala de TrofĂ©us",
                    "tutorial-ia": "Tutorial IA",
                    "favoritas-title": "Suas QuestĂ”es Favoritas",
                    "favoritas-desc": "Aqui estĂŁo todas as questĂ”es que vocĂȘ marcou para revisar mais tarde.",
                    "remover": "Remover",
                    "nenhuma-favorita": "VocĂȘ ainda nĂŁo favoritou nenhuma questĂŁo.",
                    "favoritar-dica": "Para favoritar uma questĂŁo, clique no coraĂ§ĂŁo durante o questionĂĄrio.",
                    "privacy": "PolĂ­tica de Privacidade",
                    "terms": "Termos de Uso",
                    "contact": "Contato"
                }},
                // ===== RECURSOS DE TRADUĂĂO EM INGLĂS =====
                en: { translation: {
                    "voltar": "Back",
                    "questionario": "Questionnaire",
                    "questoes-favoritas": "Favorite Questions",
                    "desempenho": "Performance",
                    "sala-trofeus": "Trophy Room",
                    "tutorial-ia": "AI Tutorial",
                    "favoritas-title": "Your Favorite Questions",
                    "favoritas-desc": "Here are all the questions you marked to review later.",
                    "remover": "Remove",
                    "nenhuma-favorita": "You haven't favorited any questions yet.",
                    "favoritar-dica": "To favorite a question, click the heart during the questionnaire.",
                    "privacy": "Privacy Policy",
                    "terms": "Terms of Use",
                    "contact": "Contact"
                }},
                // ===== RECURSOS DE TRADUĂĂO EM ESPANHOL =====
                es: { translation: {
                    "voltar": "Volver",
                    "questionario": "Cuestionario",
                    "questoes-favoritas": "Preguntas favoritas",
                    "desempenho": "Rendimiento",
                    "sala-trofeus": "Sala de Trofeos",
                    "tutorial-ia": "Tutorial IA",
                    "favoritas-title": "Tus Preguntas Favoritas",
                    "favoritas-desc": "AquĂ­ estĂĄn todas las preguntas que marcaste para revisar mĂĄs tarde.",
                    "remover": "Remover",
                    "nenhuma-favorita": "AĂșn no has marcado ninguna pregunta como favorita.",
                    "favoritar-dica": "Para marcar una pregunta como favorita, haz clic en el corazĂłn durante el cuestionario.",
                    "privacy": "PolĂ­tica de Privacidad",
                    "terms": "TĂ©rminos de Uso",
                    "contact": "Contacto"
                }}
            }
        }, function(err, t) {
            // Callback executado apĂłs inicializaĂ§ĂŁo das traduĂ§Ă”es
            updateTranslations(); // Atualiza textos da interface
            loadFavorites(); // Carrega lista de favoritos
        });

        /*
        ===== FUNĂĂES PRINCIPAIS =====
        Conjunto de funĂ§Ă”es para manipulaĂ§ĂŁo de favoritos e atualizaĂ§ĂŁo da interface
        */

        /*
        FUNĂĂO: ATUALIZAR TRADUĂĂES
        Percorre todos os elementos com data-i18n e atualiza seu conteĂșdo
        Chamada sempre que o idioma Ă© alterado
        */
        function updateTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.getAttribute('data-i18n');
                element.textContent = i18next.t(key);
            });
        }

        /**
         * FUNĂĂO: CARREGAR FAVORITOS
         * FunĂ§ĂŁo principal que carrega e exibe todas as questĂ”es favoritas
         * Recupera dados do localStorage e cria elementos HTML dinĂąmicos
         * Trata casos especiais como lista vazia
         */
        function loadFavorites() {
            // Recarrega dados mais recentes do localStorage
            favorites = JSON.parse(localStorage.getItem('studyPro_favorites') || '[]');
            const favoritesList = document.getElementById('favorites-list');

            /**
             * CASO ESPECIAL: LISTA VAZIA
             * Quando nĂŁo hĂĄ favoritos, mostra mensagem explicativa com Ă­cone
             * Orienta usuĂĄrio sobre como favoritar questĂ”es
             */
            if (favorites.length === 0) {
                favoritesList.innerHTML = `
                    <div class="no-favorites">
                        <i class="fas fa-star-half-alt"></i>
                        <h3 data-i18n="nenhuma-favorita">VocĂȘ ainda nĂŁo favoritou nenhuma questĂŁo.</h3>
                        <p data-i18n="favoritar-dica">Para favoritar uma questĂŁo, clique na estrela durante o questionĂĄrio.</p>
                    </div>
                `;
                return;
            }

            /**
             * RENDERIZAĂĂO DOS FAVORITOS
             * Para cada questĂŁo favorita, cria um card clicĂĄvel que:
             * - Exibe o texto da pergunta
             * - Mostra as opĂ§Ă”es (com destaque para a correta)
             * - Permite clicar para ir direto Ă quela questĂŁo no questionĂĄrio
             */
            favoritesList.innerHTML = ''; // Limpa conteĂșdo anterior

            favorites.forEach((favorite, index) => {
                const favoriteCard = document.createElement('div');
                favoriteCard.className = 'favorite-item';
                
                // Deixa o card clicĂĄvel para navegar direto para a questĂŁo
                favoriteCard.style.cursor = 'pointer';
                favoriteCard.addEventListener('click', () => {
                    // Passa o Ă­ndice da questĂŁo via sessionStorage
                    sessionStorage.setItem('goToQuestion', favorite.questionIndex);
                    // Redireciona para o questionĂĄrio
                    window.location.href = 'questionario.html';
                });

                // Estrutura HTML do card de favorito
                favoriteCard.innerHTML = `
                    <!-- CABEĂALHO DO CARD -->
                    <div class="favorite-header">
                        <span class="favorite-subject">QuestĂŁo ${favorite.questionIndex + 1}</span>
                        <button class="btn-remove" onclick="event.stopPropagation(); removeFavorite(${index})" data-i18n="remover">â Remover</button>
                    </div>

                    <!-- TEXTO DA PERGUNTA -->
                    <div class="favorite-question">${favorite.question}</div>

                    <!-- OPĂĂES DE RESPOSTA -->
                    <div class="favorite-options">
                        ${favorite.options.map((option, optIndex) =>
                            `<div class="option ${optIndex === favorite.correct ? 'correct' : ''}">${String.fromCharCode(65 + optIndex)}) ${option}</div>`
                        ).join('')}
                    </div>

                    <!-- EXPLICAĂĂO DA RESPOSTA -->
                    <div class="favorite-explanation">
                        <strong>ExplicaĂ§ĂŁo:</strong> ${favorite.explanation}
                    </div>
                `;

                favoritesList.appendChild(favoriteCard);
            });
        }

        /**
         * FUNĂĂO: REMOVER FAVORITO
         * Remove uma questĂŁo especĂ­fica da lista de favoritos
         * Atualiza localStorage e recarrega a interface
         * Recebe o Ă­ndice da questĂŁo a ser removida
         */
        function removeFavorite(index) {
            // Remove item do array pelo Ă­ndice
            favorites.splice(index, 1);

            // Salva alteraĂ§Ă”es no localStorage
            localStorage.setItem('studyPro_favorites', JSON.stringify(favorites));

            // Recarrega interface para refletir mudanĂ§as
            loadFavorites();
        }

        /**
        ===== EVENT LISTENERS =====
        ConfiguraĂ§ĂŁo de interatividade da pĂĄgina
        -->

        <!--
        EVENTO: DROPDOWN DE IDIOMA
        Controle de abertura/fechamento do menu de seleĂ§ĂŁo de idioma
        AnimaĂ§ĂŁo da seta e gerenciamento de estado visual
        -->
        document.getElementById('lang-toggle').addEventListener('click', (e) => {
            e.stopPropagation(); // Previne propagaĂ§ĂŁo do evento
            const langMenu = document.getElementById('lang-menu');
            const langToggle = document.getElementById('lang-toggle');
            const arrow = langToggle.querySelector('.arrow');

            // Toggle das classes para mostrar/ocultar menu
            langMenu.classList.toggle('show');
            langToggle.classList.toggle('active');

            // AnimaĂ§ĂŁo da seta (rotaĂ§ĂŁo)
            arrow.style.transform = langToggle.classList.contains('active') ? 'rotate(90deg)' : 'rotate(0deg)';
        });

        <!--
        EVENTO: SELEĂĂO DE IDIOMA
        Processa mudanĂ§a de idioma e atualiza toda a interface
        Salva preferĂȘncia no localStorage para persistĂȘncia
        Fecha menu apĂłs seleĂ§ĂŁo
        -->
        document.querySelectorAll('.lang-option').forEach(btn => {
            btn.addEventListener('click', () => {
                const lang = btn.getAttribute('data-lang');

                // Muda idioma no i18next
                i18next.changeLanguage(lang, updateTranslations);

                // Salva preferĂȘncia do usuĂĄrio
                localStorage.setItem('studyPro_lang', lang);

                // Atualiza indicador visual
                document.getElementById('current-lang').textContent = lang.toUpperCase();

                // Fecha menu e reseta estado visual
                document.getElementById('lang-menu').classList.remove('show');
                document.getElementById('lang-toggle').classList.remove('active');
                document.getElementById('lang-toggle').querySelector('.arrow').style.transform = 'rotate(0deg)';

                // Recarrega favoritos para atualizar textos
                loadFavorites();
            });
        });

        /*
        EVENTO: FECHAR MENU AO CLICAR FORA
        Fecha o dropdown de idioma quando usuĂĄrio clica em qualquer lugar fora
        Melhora experiĂȘncia do usuĂĄrio evitando menu aberto desnecessariamente
        */
        document.addEventListener('click', (e) => {
            const langToggle = document.getElementById('lang-toggle');
            const langMenu = document.getElementById('lang-menu');

            // Fecha menu se clique foi fora do toggle
            if (!langToggle.contains(e.target)) {
                langMenu.classList.remove('show');
                langToggle.classList.remove('active');
                langToggle.querySelector('.arrow').style.transform = 'rotate(0deg)';
            }
        });

        /*
        EVENTO: ANO NO RODAPĂ
        Define ano atual dinamicamente no copyright
        MantĂ©m informaĂ§ĂŁo sempre atualizada
        */
        const yearEl = document.getElementById('year');
        if (yearEl) yearEl.textContent = new Date().getFullYear();
    </script>
</body>
