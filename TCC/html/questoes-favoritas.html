<!-- ================================================
     ARQUIVO: questoes-favoritas.html
     LOCALIZAÇÃO: d:\TCC\html\questoes-favoritas.html
     DESCRIÇÃO: Página onde o usuário pode ver e gerenciar suas questões favoritas
     FUNCIONALIDADE:
       - Lista de questões marcadas como favoritas
       - Navegação consistente com o restante do site
       - Seletor multilíngue de idioma
       - Links de retorno e rodapé
       - Todos os textos traduzíveis com i18next
     ================================================ -->

<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Questões Favoritas - StudyPro</title>
    <meta name="description" content="Veja as questões que você salvou como favoritas no StudyPro.">
    <!-- fontes e ícones comuns -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../css/questoes-favoritas.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://unpkg.com/i18next@23.15.1/dist/umd/i18next.min.js"></script>
    <script type="module" src="/TCC/scripts/questoes-favoritas.js"></script>
</head>

<body>
    <!--
    ================================================================================
    SEÇÃO: HEADER - CABEÇALHO PRINCIPAL
    Contém logo, seletor de idioma e botão de retorno
    ================================================================================
    -->
    <header>
        <!--
        CABEÇALHO PRINCIPAL
        Estrutura superior da página com elementos de navegação global
        -->
        <div class="main-header">
            <!--
            LOGO DA APLICAÇÃO
            Identidade visual consistente em todas as páginas
            Emoji de cérebro representa o foco em aprendizado
            -->
            <div class="logo">
                <span class="brain">🧠</span> StudyPro
            </div>

            <!--
            CONTROLES DO CABEÇALHO DIREITO
            Agrupa seletor de idioma e botão de navegação
            -->
            <div class="header-right">
                <!--
                DROPDOWN DE SELEÇÃO DE IDIOMA
                Permite alternar entre português, inglês e espanhol
                Salva preferência do usuário no localStorage
                -->
                <div class="language-dropdown">
                    <button class="lang-btn" id="lang-toggle">
                        <span id="current-lang">PT</span>
                        <span class="arrow">▶</span>
                    </button>
                    <ul class="lang-menu" id="lang-menu">
                        <li><button class="lang-option" data-lang="pt">PT</button></li>
                        <li><button class="lang-option" data-lang="en">EN</button></li>
                        <li><button class="lang-option" data-lang="es">ES</button></li>
                    </ul>
                </div>

                <!--
                BOTÃO DE RETORNO
                Link para página inicial com ícone e texto traduzível
                Mantém consistência de navegação
                -->
                <a href="../index.html" class="btn back-btn" data-i18n="voltar">Voltar</a>
            </div>
        </div>
    </header>

    <!--
    ================================================================================
    SEÇÃO: NAVEGAÇÃO SECUNDÁRIA
    Menu de navegação entre as principais seções do aplicativo
    ================================================================================
    -->
    <nav class="nav-buttons">
        <!--
        BOTÕES DE NAVEGAÇÃO
        Links para todas as seções principais do aplicativo
        Cada botão tem ícone Font Awesome e texto traduzível
        Classe 'active' pode ser aplicada dinamicamente se necessário
        -->
        <a href="questionario.html" class="nav-btn" data-i18n="questionario"><i class="fas fa-question-circle"></i>
            Questionário</a>
        <a href="questoes-favoritas.html" class="nav-btn" data-i18n="questoes-favoritas"><i class="fas fa-star"></i>
            Questões favoritas</a>
        <a href="desempenho.html" class="nav-btn" data-i18n="desempenho"><i class="fas fa-chart-line"></i>
            Desempenho</a>
        <a href="sala-trofeus.html" class="nav-btn" data-i18n="sala-trofeus"><i class="fas fa-trophy"></i> Sala de
            Troféus</a>
        <a href="tutorial-ia.html" class="nav-btn" data-i18n="tutorial-ia"><i class="fas fa-robot"></i> Tutorial IA</a>
    </nav>

    <!--
    ================================================================================
    SEÇÃO: CONTEÚDO PRINCIPAL
    Área central da página com título, descrição e lista de favoritos
    ================================================================================
    -->
    <main>
        <!--
        TÍTULO DA PÁGINA
        Cabeçalho principal explicando propósito da página
        Texto traduzível para suporte multilíngue
        -->
        <h1 data-i18n="favoritas-title">Suas Questões Favoritas</h1>

        <!--
        DESCRIÇÃO EXPLICATIVA
        Texto descritivo sobre a funcionalidade da página
        Orienta usuário sobre o que encontrar na seção
        -->
        <p data-i18n="favoritas-desc">Aqui estão todas as questões que você marcou para revisar mais tarde.</p>

        <!--
        CONTAINER DA LISTA DE FAVORITOS
        Área onde os cards de questões favoritas serão renderizados dinamicamente
        JavaScript popula este container com dados do localStorage
        -->
        <div class="favorites-list" id="favorites-list">
            <!-- cards gerados dinamicamente pelo JavaScript -->
        </div>
    </main>

    <footer>
        <p>&copy; <span id="year"></span> StudyPro. Todos os direitos reservados.</p>
        <p>
            <a href="#" data-i18n="privacy">Política de Privacidade</a> |
            <a href="#" data-i18n="terms">Termos de Uso</a> |
            <a href="#" data-i18n="contact">Contato</a>
        </p>
    </footer>
</body>-
</html>
