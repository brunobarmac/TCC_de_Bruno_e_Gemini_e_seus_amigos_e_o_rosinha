<!DOCTYPE html>
<html lang="pt-br">

<head>
   <title>Cadastrar</title>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="styles/index.css">
   <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css">
   <script type="module" src="scripts/firebaseauth.js"></script>
</head>

<body>

   <div class="container" id="signup" style="display:none;"> <!-- cadastro -->
      <h1 class="form-title">Register</h1>
      <form method="post" action="">
         <div id="signUpMessage" class="messageDiv" style="display:none;"></div>
         <div class="input-group">
            <i class="bx bxs-user"></i>
            <input type="text" name="fName" id="fName" placeholder="Nome" required>
         </div>

         <div class="input-group">
            <i class="bx bxs-user"></i>
            <input type="text" name="lName" id="lName" placeholder="Sobrenome" required>
         </div>

         <div class="input-group">
            <i class="bx bxs-envelope"></i>
            <input type="email" name="email" id="rEmail" placeholder="Email" required>
         </div>

         <div class="input-group">
            <i class="bx bxs-lock-alt"></i>
            <input type="password" name="password" id="rPassword" placeholder="Senha" required>
         </div>
         <input type="submit" class="btn" value="Cadastrar-se" name="signUp" id="submitSignUp">
      </form>
      <div id="signUpMessage"></div>

      <p class="or">
         -------or-------
      </p>

      <div class="icons">
         <i class="bx bxl-google"></i>
         <i class="bx bxl-facebook"></i>
      </div>

      <div class="register-link">
         <p>Já possui uma conta?</p>
         <button id="signInButton">Conectar</button>
      </div>
   </div>



   <div class="container" id="signIn"> <!-- login -->
      <h1 class="form-title">Login</h1>
      <form method="post" action="">
         <div id="signInMessage" class="messageDiv" style="display:none;"></div>
         <div class="input-group">
            <i class="bx bxs-envelope"></i>
            <input type="email" name="email" id="email" placeholder="Email" required>
         </div>

         <div class="input-group">
            <i class="bx bxs-lock-alt"></i>
            <input type="password" name="password" id="password" placeholder="Senha" required>
         </div>

         <div class="recover">
            <!--Link para mudar de senha-->
            <a href="#">Esqueci a senha</a>
         </div>

         <button class="btn" value="Conectar-se" name="signIn" id="submitSignIn">
            Conectar-se
         </button>
      </form>
      <div id="signInMessage"></div>

      <p class="or">
         -------or-------
      </p>

      <div class="icons">
         <i class="bx bxl-google"></i>
         <i class="bx bxl-facebook"></i>
      </div>

      <div class="register-link">
         <p> Não possui uma conta?</p>
         <button id="signUpButton">Cadastrar</button>
      </div>
   </div>
   <script src="scripts/script.js"></script>

</body>

</html>
